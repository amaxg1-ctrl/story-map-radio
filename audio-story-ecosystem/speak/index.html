<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPEAK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ──────────────────────────────────────────────────── */
    :root {
      --bg-a: #eceef2; --bg-b: #d8dae1;
      --accent:        rgb(255,136,0);
      --accent-rgb:    255,136,0;
      --accent-glow:   rgba(255,136,0,0.38);
      --accent-ring:   rgba(255,136,0,0.13);
      --accent-bg:     rgba(255,136,0,0.16);
      --accent-border: rgba(255,136,0,0.55);
      --text:          rgba(88,90,102,0.82);
      --text-muted:    #b0b3bc;
      --status:        #c4c6ce;
      --btn-bg:        rgba(158,161,170,0.26);
      --btn-border:    rgba(255,255,255,0.55);
      --btn-inset:     rgba(255,255,255,0.45);
      --mark-base:     rgba(88,90,102,0.13);
      --mark-fill:     rgba(255,136,0,0.22);
      --mark-stroke:   rgba(255,255,255,0.30);
      --idle-ring:     rgba(172,174,183,0.48);
      --idle-glow:     rgba(185,187,196,0.18);
      --arrow-down:    rgb(160,80,255);
    }

    body.dark {
      --bg-a: #13141a; --bg-b: #0f1014;
      --accent:        rgb(160,80,255);
      --accent-rgb:    160,80,255;
      --accent-glow:   rgba(160,80,255,0.44);
      --accent-ring:   rgba(160,80,255,0.15);
      --accent-bg:     rgba(160,80,255,0.18);
      --accent-border: rgba(160,80,255,0.58);
      --text:          rgba(200,202,218,0.85);
      --text-muted:    rgba(140,142,158,0.75);
      --status:        rgba(120,122,138,0.75);
      --btn-bg:        rgba(42,44,58,0.55);
      --btn-border:    rgba(255,255,255,0.10);
      --btn-inset:     rgba(255,255,255,0.05);
      --mark-base:     rgba(200,202,218,0.10);
      --mark-fill:     rgba(160,80,255,0.22);
      --mark-stroke:   rgba(255,255,255,0.22);
      --idle-ring:     rgba(100,102,125,0.55);
      --idle-glow:     rgba(80,82,110,0.22);
      --arrow-down:    rgb(255,136,0);
    }

    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(150deg, var(--bg-a) 0%, var(--bg-b) 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none; -webkit-user-select: none;
      transition: background 0.3s;
    }

    .app-name {
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 4px;
      transition: color 0.3s;
    }

    .stage {
      position: relative;
      width: min(500px, 68vmin); height: min(500px, 68vmin);
      display: flex; align-items: center; justify-content: center;
    }

    #voiceCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .controls { position: relative; z-index: 10; display: flex; align-items: center; gap: 12px; }

    .btn {
      position: relative; width: 58px; height: 58px; border-radius: 50%;
      border: 1.5px solid var(--btn-border);
      background: var(--btn-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, box-shadow 0.18s, color 0.18s, border-color 0.18s;
      box-shadow: 0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
      outline: none; -webkit-tap-highlight-color: transparent;
    }

    .btn:hover:not(:disabled) { filter: brightness(1.12); }

    .btn.active {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
      box-shadow:
        0 0 0 3px var(--accent-ring),
        0 0 22px var(--accent-glow),
        0 2px 14px rgba(0,0,0,0.09),
        inset 0 1px 0 var(--btn-inset);
    }

    .btn:disabled { opacity: 0.28; cursor: default; }
    .btn svg { width: 21px; height: 21px; flex-shrink: 0; pointer-events: none; }

    .btn-label {
      position: absolute; bottom: -21px; left: 50%; transform: translateX(-50%);
      font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted); white-space: nowrap; pointer-events: none;
    }

    /* ── Timer column ──────────────────────────────────────────────────── */
    .timer-col {
      position: fixed;
      left: calc(50% - min(500px, 68vmin) / 2 - 88px);
      top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 29px; z-index: 100;
    }

    .mark-svg { display: block; flex-shrink: 0; overflow: visible; }

    /* SVG text — brush font + theme-driven colors */
    .timer-col text {
      font-family: 'Fugaz One', sans-serif;
    }
    .mark-base   { fill: var(--mark-base); stroke: var(--mark-stroke); stroke-width: 1.5; paint-order: stroke; }
    .mark-accent { fill: var(--mark-fill); stroke: var(--mark-stroke); stroke-width: 1.5; paint-order: stroke; }
    #arrowAbove36 polygon { fill: var(--accent); }
    #arrowBelow3  polygon { fill: var(--arrow-down); }
    #arrowAbove36, #arrowBelow3 { transition: opacity 0.5s ease; }

    /* ── Settings bar ──────────────────────────────────────────────────── */
    .settings-bar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0;
      background: var(--btn-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--btn-border); border-radius: 40px;
      padding: 5px 6px 5px 10px; z-index: 200;
      box-shadow: 0 4px 28px rgba(0,0,0,0.12);
      transition: background 0.3s, border-color 0.3s;
    }

    .settings-arrows {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      margin-right: 10px;
    }

    .arrow-btn {
      width: 20px; height: 19px; border-radius: 4px; border: none;
      background: transparent; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      padding: 0; transition: color 0.18s; -webkit-tap-highlight-color: transparent;
    }
    .arrow-btn:hover { color: var(--text); }
    .arrow-btn svg { width: 9px; height: 9px; pointer-events: none; }

    .settings-label {
      font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); min-width: 108px; text-align: center;
      transition: color 0.3s;
    }

    .settings-actions { display: flex; gap: 6px; margin-left: 10px; }

    .action-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1.5px solid var(--btn-border);
      background: var(--btn-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, box-shadow 0.18s, color 0.18s, border-color 0.18s;
      box-shadow: 0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
      outline: none; -webkit-tap-highlight-color: transparent;
    }
    .action-btn svg { width: 20px; height: 20px; pointer-events: none; }

    /* Sun — always orange; Moon — always purple */
    .sun-btn  { color: rgb(255,136,0); }
    .moon-btn { color: rgb(160,80,255); }

    .sun-btn.active {
      background: rgba(255,136,0,0.16); border-color: rgba(255,136,0,0.55);
      box-shadow: 0 0 0 3px rgba(255,136,0,0.13), 0 0 18px rgba(255,136,0,0.40),
                  0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
    }
    .moon-btn.active {
      background: rgba(160,80,255,0.16); border-color: rgba(160,80,255,0.55);
      box-shadow: 0 0 0 3px rgba(160,80,255,0.13), 0 0 18px rgba(160,80,255,0.44),
                  0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
    }

    /* Leave — faint purple; Stay — faint orange */
    #btnGo   {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      color: rgba(160,80,255,0.62);
      border-color: rgba(160,80,255,0.28);
      background: rgba(160,80,255,0.08);
    }
    #btnStay {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      color: rgba(255,136,0,0.62);
      border-color: rgba(255,136,0,0.28);
      background: rgba(255,136,0,0.08);
    }

    /* ── App nav ─────────────────────────────────────────────────────── */
    .app-nav {
      position: fixed; bottom: 10%;
      display: flex; align-items: center; gap: 2px;
      cursor: pointer; z-index: 50;
      color: var(--text-muted);
      opacity: 0.42; transition: opacity 0.2s, color 0.2s;
      padding: 8px;
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .app-nav:hover { opacity: 1; color: var(--text); }
    .app-nav-right { right: 20px; }
    .app-nav-left  { left: 20px; }
    .app-nav svg   { flex-shrink: 0; }
    .app-nav-top   { bottom: auto; top: 10%; left: 10%; flex-direction: column; }
    .app-nav-top span { writing-mode: vertical-rl; transform: rotate(180deg); }

    .info { margin-top: 0; margin-bottom: 40px; }

    .status-text {
      font-size: 9.5px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--status); transition: color 0.3s;
    }

    /* ── Status icons ──────────────────────────────────────────────────── */
    .status-icons {
      position: fixed; top: 16px; right: 16px;
      display: flex; align-items: center; gap: 10px; z-index: 300;
    }
    .si {
      position: relative; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); opacity: 0.30;
      transition: opacity 0.2s, color 0.2s;
    }
    .si.si-on { color: var(--accent); opacity: 0.48; }
    .si svg { pointer-events: none; }
    .si > svg:not(.si-slash) { width: 100%; height: 100%; flex-shrink: 0; }
    .si-slash {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none; color: var(--text-muted);
    }
    .si.si-off .si-slash { display: block; }
    #siHeadphones { cursor: pointer; }
    #siLocation { cursor: pointer; }
    .si-hp-wrap  { position: relative; }
    .si-mic-wrap { position: relative; }
    .si-mic-btn {
      background: none; border: none; padding: 0;
      cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent;
    }
    .si-mic-btn:hover { opacity: 0.65 !important; }
    .mic-popup {
      display: none;
      position: absolute; top: calc(100% + 6px); right: 0;
      min-width: 160px;
      background: var(--btn-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--btn-border);
      border-radius: 12px; padding: 5px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.14); z-index: 400;
      transition: background 0.3s, border-color 0.3s;
    }
    .mic-popup-item {
      padding: 7px 10px;
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text); border-radius: 8px;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .mic-popup-item:hover { background: var(--accent-bg); color: var(--accent); }
    .mic-popup-item.si-active { color: var(--accent); font-weight: 700; }

    /* ── Exit to ALOUD ───────────────────────────────────────────────────── */
    .exit-up .settings-bar {
      transform: translateX(-50%) translateY(220%) !important;
      opacity: 0 !important;
      transition: transform 0.55s cubic-bezier(0.4,0,1,1), opacity 0.4s ease-in !important;
    }
    .exit-up .app-name,
    .exit-up .info {
      opacity: 0 !important;
      transition: opacity 0.28s ease-out !important;
    }
    .exit-up .app-nav {
      opacity: 0 !important;
      transition: opacity 0.22s ease-out !important;
    }

    /* ── Exit to OUT ──────────────────────────────────────────────────────── */
    .exit-down .stage {
      transform: translateY(80px) scale(0.45) !important;
      opacity: 0 !important;
      transition: transform 0.6s cubic-bezier(0.4,0,0.8,1), opacity 0.4s ease-in 0.05s !important;
    }
    .exit-down .app-name,
    .exit-down .info        { opacity: 0 !important; transition: opacity 0.2s ease-out !important; }
    .exit-down .settings-bar { opacity: 0 !important; transition: opacity 0.25s ease-out !important; }
    .exit-down .app-nav     { opacity: 0 !important; transition: opacity 0.18s ease-out !important; }

    /* ── Exit to LISTEN ───────────────────────────────────────────────────── */
    .exit-right .stage {
      transform: rotate(180deg) scale(0.85) !important;
      opacity: 0 !important;
      transition: transform 0.6s cubic-bezier(0.4,0,0.8,1), opacity 0.4s ease-in 0.1s !important;
    }
    .exit-right .app-name,
    .exit-right .info      { opacity: 0 !important; transition: opacity 0.2s ease-out !important; }
    .exit-right .settings-bar { opacity: 0 !important; transition: opacity 0.25s ease-out !important; }
    .exit-right .app-nav   { opacity: 0 !important; transition: opacity 0.18s ease-out !important; }
  </style>
</head>
<body>

  <div class="timer-col" id="timerCol">

    <svg id="arrowAbove36" viewBox="0 0 16 8" width="16" height="8" style="opacity:0;margin-bottom:4px"><polygon points="8,0 16,8 0,8" opacity="0.85"/></svg>

    <!-- 36 -->
    <svg class="mark-svg" viewBox="0 0 80 58" width="80" height="58">
      <defs><clipPath id="mask-36"><rect id="fill-36" x="-20" y="58" width="120" height="0"/></clipPath></defs>
      <text x="40" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-base">36</text>
      <text x="40" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-accent" clip-path="url(#mask-36)">36</text>
    </svg>

    <!-- 18 -->
    <svg class="mark-svg" viewBox="0 0 80 58" width="80" height="58">
      <defs><clipPath id="mask-18"><rect id="fill-18" x="-20" y="58" width="120" height="0"/></clipPath></defs>
      <text x="40" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-base">18</text>
      <text x="40" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-accent" clip-path="url(#mask-18)">18</text>
    </svg>

    <!-- 9 -->
    <svg class="mark-svg" viewBox="0 0 58 58" width="58" height="58">
      <defs><clipPath id="mask-9"><rect id="fill-9" x="-10" y="58" width="78" height="0"/></clipPath></defs>
      <text x="29" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-base">9</text>
      <text x="29" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-accent" clip-path="url(#mask-9)">9</text>
    </svg>

    <!-- 6 -->
    <svg class="mark-svg" viewBox="0 0 58 58" width="58" height="58">
      <defs><clipPath id="mask-6"><rect id="fill-6" x="-10" y="58" width="78" height="0"/></clipPath></defs>
      <text x="29" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-base">6</text>
      <text x="29" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-accent" clip-path="url(#mask-6)">6</text>
    </svg>

    <!-- 3 -->
    <svg class="mark-svg" viewBox="0 0 58 58" width="58" height="58">
      <defs><clipPath id="mask-3"><rect id="fill-3" x="-10" y="58" width="78" height="0"/></clipPath></defs>
      <text x="29" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-base">3</text>
      <text x="29" y="29" dominant-baseline="central" text-anchor="middle" font-size="44" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" class="mark-accent" clip-path="url(#mask-3)">3</text>
    </svg>

    <svg id="arrowBelow3" viewBox="0 0 16 8" width="16" height="8" style="opacity:0;margin-top:4px"><polygon points="0,0 16,0 8,8" opacity="0.85"/></svg>

  </div>

  <div class="app-name">Speak</div>

  <div class="info">
    <div class="status-text" id="statusText">ready</div>
  </div>

  <div class="stage">
    <canvas id="voiceCanvas"></canvas>
    <div class="controls">

      <button class="btn" id="btnArm" title="Arm microphone">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <span class="btn-label">Arm</span>
      </button>

      <button class="btn" id="btnPlay" disabled title="Start recording">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <span class="btn-label">Play</span>
      </button>

      <button class="btn" id="btnPause" disabled title="Pause recording">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <span class="btn-label">Pause</span>
      </button>

      <button class="btn" id="btnStop" disabled title="Stop recording">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
        <span class="btn-label">Stop</span>
      </button>

    </div>
  </div>

  <!-- ── App nav ───────────────────────────────────────────────────────── -->
  <div class="app-nav app-nav-top app-nav-left" id="navToAloud">
    <svg viewBox="0 0 10 10" width="11" height="11" fill="currentColor">
      <path d="M5,2 L1,6 L9,6 Z"/>
    </svg>
    <span>ALOUD</span>
  </div>

  <div class="app-nav app-nav-right" id="navToListen">
    <span>LISTEN</span>
    <svg viewBox="0 0 10 10" width="11" height="11" fill="currentColor">
      <path d="M8,5 L4,1 L4,9 Z"/>
    </svg>
  </div>

  <!-- ── Settings bar ─────────────────────────────────────────────────── -->
  <div class="settings-bar">

    <div class="settings-arrows">
      <button class="arrow-btn" id="arrowUp" title="Previous setting">
        <svg viewBox="0 0 9 9" fill="currentColor"><path d="M4.5 1.5L8.5 7.5H0.5Z"/></svg>
      </button>
      <button class="arrow-btn" id="arrowDown" title="Next setting">
        <svg viewBox="0 0 9 9" fill="currentColor"><path d="M4.5 7.5L8.5 1.5H0.5Z"/></svg>
      </button>
    </div>

    <span class="settings-label" id="settingsLabel">Display Mode</span>

    <div class="settings-actions" id="themeActions">
      <button class="action-btn sun-btn" id="btnSun" title="Light mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4.2" fill="currentColor" stroke="none"/>
          <line x1="12" y1="2"    x2="12" y2="5.2"/>
          <line x1="12" y1="18.8" x2="12" y2="22"/>
          <line x1="2"  y1="12"   x2="5.2" y2="12"/>
          <line x1="18.8" y1="12" x2="22" y2="12"/>
          <line x1="5.05" y1="5.05"   x2="7.4"  y2="7.4"/>
          <line x1="16.6" y1="16.6"   x2="18.95" y2="18.95"/>
          <line x1="5.05" y1="18.95"  x2="7.4"  y2="16.6"/>
          <line x1="16.6" y1="7.4"    x2="18.95" y2="5.05"/>
        </svg>
      </button>
      <button class="action-btn moon-btn" id="btnMoon" title="Dark mode">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
    <div class="settings-actions" id="indexActions" style="display:none">
      <button class="action-btn" id="btnGo" title="Leave to index">LEAVE</button>
      <button class="action-btn" id="btnStay" title="Stay here">STAY</button>
    </div>

  </div>

<script>
(function () {
  'use strict';

  // ── Canvas setup ──────────────────────────────────────────────────────────
  const canvas = document.getElementById('voiceCanvas');
  const ctx    = canvas.getContext('2d');
  const SIZE   = canvas.parentElement.offsetWidth;
  const dpr    = window.devicePixelRatio || 1;
  canvas.width  = SIZE * dpr;
  canvas.height = SIZE * dpr;
  ctx.scale(dpr, dpr);

  const CX     = SIZE / 2;
  const CY     = SIZE / 2;
  const BASE_R = Math.round(SIZE * 0.38); // larger circle

  // ── Precomputed geometry for the organic circle (128 angular samples) ─────
  const N_CURVE = 128;
  const COS_A   = new Float64Array(N_CURVE);
  const SIN_A   = new Float64Array(N_CURVE);
  for (let i = 0; i < N_CURVE; i++) {
    const a  = (i / N_CURVE) * Math.PI * 2;
    COS_A[i] = Math.cos(a);
    SIN_A[i] = Math.sin(a);
  }

  // ── Elements ──────────────────────────────────────────────────────────────
  const btnArm   = document.getElementById('btnArm');
  const btnPlay  = document.getElementById('btnPlay');
  const btnPause = document.getElementById('btnPause');
  const btnStop  = document.getElementById('btnStop');
  const statusEl = document.getElementById('statusText');

  // ── App state ─────────────────────────────────────────────────────────────
  let state = 'idle';

  // ── Theme ─────────────────────────────────────────────────────────────────
  let theme = 'light';

  function accentRGBA(a) {
    return theme === 'dark' ? `rgba(160,80,255,${a})` : `rgba(255,136,0,${a})`;
  }

  // ── Audio state ───────────────────────────────────────────────────────────
  let audioCtx     = null;
  let analyser     = null;
  let micStream    = null;
  let smoothAmp    = 0;
  let freqData     = null;  // Uint8Array, frequencyBinCount long
  let timeData     = null;  // Uint8Array, fftSize long
  let angleBins    = null;  // precomputed: which freq bin each circle angle maps to
  let voiceMinBin  = 0;
  let voiceMaxBin  = 0;

  // ── Organic circle state ──────────────────────────────────────────────────
  let smoothedRadii = null; // Float32Array, N_CURVE long — slow-lerp base shape
  let spikeRadii    = null; // Float32Array, N_CURVE long — fast-lerp spike layer
  let phase         = 0;

  async function startAudio() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      analyser  = audioCtx.createAnalyser();

      // High resolution FFT for accurate voice-range frequency data
      analyser.fftSize              = 2048;
      analyser.smoothingTimeConstant = 0.75;

      audioCtx.createMediaStreamSource(micStream).connect(analyser);

      // Compute voice frequency bin range (80 Hz – 8 000 Hz)
      const binHz  = audioCtx.sampleRate / analyser.fftSize;
      voiceMinBin  = Math.max(1, Math.round(80   / binHz));
      voiceMaxBin  = Math.min(analyser.frequencyBinCount - 1, Math.round(8000 / binHz));

      // Precompute angle → frequency bin lookup (log-spaced 80–8000 Hz)
      const logMin = Math.log(80);
      const logMax = Math.log(8000);
      angleBins    = new Int32Array(N_CURVE);
      for (let i = 0; i < N_CURVE; i++) {
        const freq  = Math.exp(logMin + (i / N_CURVE) * (logMax - logMin));
        angleBins[i] = Math.max(voiceMinBin,
                        Math.min(voiceMaxBin, Math.round(freq / binHz)));
      }

      freqData     = new Uint8Array(analyser.frequencyBinCount);
      timeData     = new Uint8Array(analyser.fftSize);
      smoothedRadii = new Float32Array(N_CURVE).fill(BASE_R);
      spikeRadii    = new Float32Array(N_CURVE).fill(0);

      return true;
    } catch {
      setStatus('microphone access denied');
      return false;
    }
  }

  function stopAudio() {
    analyser      = null;
    smoothAmp     = 0;
    freqData      = null;
    timeData      = null;
    smoothedRadii = null;
    spikeRadii    = null;
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx)  { audioCtx.close(); audioCtx = null; }
  }

  // ── Timer ─────────────────────────────────────────────────────────────────
  const SEGMENTS = [
    { el: document.getElementById('fill-3'),  n:  3 },
    { el: document.getElementById('fill-6'),  n:  6 },
    { el: document.getElementById('fill-9'),  n:  9 },
    { el: document.getElementById('fill-18'), n: 18 },
    { el: document.getElementById('fill-36'), n: 36 },
  ];
  const MAX_MS = 72 * 60 * 1000;
  const VB_H   = 58;

  // Each bar fills in n minutes, holds full, then empties so all reach 0 at t=72
  function barPct(min, n) {
    if (min < n)       return min / n;         // filling  0→1
    if (min < 72 - n)  return 1;               // held full
    if (min < 72)      return (72 - min) / n;  // emptying 1→0
    return 0;
  }

  const arrowAbove36 = document.getElementById('arrowAbove36');
  const arrowBelow3  = document.getElementById('arrowBelow3');

  function updateBar(ms) {
    const min = ms / 60000;
    SEGMENTS.forEach(({ el, n }) => {
      const p = barPct(min, n);
      el.setAttribute('y',      VB_H * (1 - p));
      el.setAttribute('height', VB_H * p);
    });
    arrowAbove36.style.opacity = min < 36 ? '1' : '0';
    arrowBelow3.style.opacity  = min >= 36 ? '1' : '0';
  }

  function resetBar() {
    SEGMENTS.forEach(({ el }) => {
      el.setAttribute('y',      VB_H);
      el.setAttribute('height', 0);
    });
    arrowAbove36.style.opacity = '0';
    arrowBelow3.style.opacity  = '0';
  }

  let timerInterval = null;
  let elapsedMs     = 0;
  let timerStart    = null;

  function startTimer()  { timerStart = Date.now(); timerInterval = setInterval(tick, 80); }
  function pauseTimer()  { elapsedMs += Date.now() - timerStart; clearInterval(timerInterval); timerInterval = null; }
  function resetTimer()  { clearInterval(timerInterval); timerInterval = null; elapsedMs = 0; timerStart = null; }

  function tick() {
    const total = elapsedMs + (Date.now() - timerStart);
    if (total >= MAX_MS) { triggerStop(); return; }
    updateBar(total);
  }

  // ── Drawing ───────────────────────────────────────────────────────────────

  function drawIdleCircle() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    const glowColor = getComputedStyle(document.documentElement).getPropertyValue('--idle-glow').trim();
    const ringColor = getComputedStyle(document.documentElement).getPropertyValue('--idle-ring').trim();
    const grd = ctx.createRadialGradient(CX, CY, BASE_R - 4, CX, CY, BASE_R + 16);
    grd.addColorStop(0, glowColor);
    grd.addColorStop(1, 'rgba(128,128,160,0)');
    ctx.beginPath();
    ctx.arc(CX, CY, BASE_R + 16, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(CX, CY, BASE_R, 0, Math.PI * 2);
    ctx.strokeStyle = ringColor;
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  function drawOrganicCircle(vol) {
    ctx.clearRect(0, 0, SIZE, SIZE);

    const dynBase    = BASE_R + vol * SIZE * 0.04;
    const MAX_DEFORM = SIZE * 0.085;   // smooth-layer deform range
    const WOBBLE_AMP = SIZE * 0.018;
    const SPIKE_SCALE = SIZE * 0.065;  // spike-layer max push
    const MAX_R       = SIZE * 0.488;  // hard clamp — keeps spikes inside canvas

    // Compute per-point combined radius (smooth base + sharp spike layer)
    const finalR = new Float32Array(N_CURVE);
    for (let i = 0; i < N_CURVE; i++) {
      const bin = angleBins[i];

      // 5-bin averaged amplitude for smooth layer (voice range)
      let ampSmooth = freqData[bin - 2 < voiceMinBin ? voiceMinBin : bin - 2]
                    + freqData[bin - 1 < voiceMinBin ? voiceMinBin : bin - 1]
                    + freqData[bin]
                    + freqData[bin + 1 > voiceMaxBin ? voiceMaxBin : bin + 1]
                    + freqData[bin + 2 > voiceMaxBin ? voiceMaxBin : bin + 2];
      ampSmooth = (ampSmooth / 5) / 255;

      // Organic wobble
      const a = (i / N_CURVE) * Math.PI * 2;
      const wobble = Math.sin(a * 3 + phase)        * WOBBLE_AMP
                   + Math.sin(a * 5 + phase * 1.4)  * WOBBLE_AMP * 0.45
                   + Math.sin(a * 2 + phase * 0.65) * WOBBLE_AMP * 0.3;

      const targetSmooth = dynBase + ampSmooth * MAX_DEFORM + wobble;
      smoothedRadii[i]   = smoothedRadii[i] * 0.70 + targetSmooth * 0.30;

      // Single-bin raw amplitude for spike layer (power-emphasised, fast)
      const rawAmp        = freqData[bin] / 255;
      const targetSpike   = Math.pow(rawAmp, 1.6) * SPIKE_SCALE;
      spikeRadii[i]       = spikeRadii[i] * 0.44 + targetSpike * 0.56;

      finalR[i] = Math.min(smoothedRadii[i] + spikeRadii[i], MAX_R);
    }

    // Soft inner glow when there is volume
    if (vol > 0.015) {
      const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, BASE_R * 1.18);
      grd.addColorStop(0, accentRGBA(vol * 0.07));
      grd.addColorStop(1, accentRGBA(0));
      ctx.beginPath();
      ctx.arc(CX, CY, BASE_R * 1.18, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Midpoint quadratic Bézier smooth closed curve
    ctx.beginPath();
    for (let i = 0; i < N_CURVE; i++) {
      const j  = (i + 1) % N_CURVE;
      const x1 = CX + finalR[i] * COS_A[i];
      const y1 = CY + finalR[i] * SIN_A[i];
      const x2 = CX + finalR[j] * COS_A[j];
      const y2 = CY + finalR[j] * SIN_A[j];
      if (i === 0) {
        const k = N_CURVE - 1;
        ctx.moveTo((CX + finalR[k] * COS_A[k] + x1) / 2,
                   (CY + finalR[k] * SIN_A[k] + y1) / 2);
      }
      ctx.quadraticCurveTo(x1, y1, (x1 + x2) / 2, (y1 + y2) / 2);
    }
    ctx.closePath();

    ctx.strokeStyle = accentRGBA(0.28 + vol * 0.62);
    ctx.lineWidth   = 1.5 + vol * 2.5;
    ctx.shadowBlur  = 5 + vol * 18;
    ctx.shadowColor = accentRGBA(0.55);
    ctx.stroke();
    ctx.shadowBlur  = 0;

    phase += 0.018;
  }

  // ── Animation loop ────────────────────────────────────────────────────────
  function loop() {
    requestAnimationFrame(loop);

    if (!analyser) { drawIdleCircle(); return; }

    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);

    let sum = 0;
    for (let i = 0; i < timeData.length; i++) {
      const v = (timeData[i] - 128) / 128;
      sum += v * v;
    }
    smoothAmp = smoothAmp * 0.80 + Math.sqrt(sum / timeData.length) * 0.20;

    drawOrganicCircle(smoothAmp);
  }

  // ── UI sync ───────────────────────────────────────────────────────────────
  function setStatus(msg) { statusEl.textContent = msg; }

  function syncUI() {
    [btnArm, btnPlay, btnPause, btnStop].forEach(b => b.classList.remove('active'));
    switch (state) {
      case 'idle':
        btnArm.disabled = false; btnPlay.disabled = true;
        btnPause.disabled = true; btnStop.disabled = true;
        setStatus('ready');
        break;
      case 'armed':
        btnArm.disabled = false; btnPlay.disabled = false;
        btnPause.disabled = true; btnStop.disabled = false;
        btnArm.classList.add('active');
        setStatus('armed · press play to record');
        break;
      case 'recording':
        btnArm.disabled = true; btnPlay.disabled = true;
        btnPause.disabled = false; btnStop.disabled = false;
        btnPlay.classList.add('active');
        setStatus('recording');
        break;
      case 'paused':
        btnArm.disabled = true; btnPlay.disabled = false;
        btnPause.disabled = false; btnStop.disabled = false;
        btnPause.classList.add('active');
        setStatus('paused · press play to continue');
        break;
    }
  }

  function triggerStop() { stopAudio(); resetTimer(); state = 'idle'; syncUI(); }

  // ── Button handlers ───────────────────────────────────────────────────────
  btnArm.addEventListener('click', async () => {
    if (state === 'idle') {
      resetBar();
      const ok = await startAudio();
      if (!ok) return;
      state = 'armed'; syncUI();
    } else if (state === 'armed') {
      stopAudio(); state = 'idle'; syncUI();
    }
  });

  btnPlay.addEventListener('click', () => {
    if (state === 'armed' || state === 'paused') {
      state = 'recording'; syncUI(); startTimer();
    }
  });

  btnPause.addEventListener('click', () => {
    if (state === 'recording') {
      state = 'paused'; syncUI(); pauseTimer();
      arrowAbove36.style.opacity = '0';
      arrowBelow3.style.opacity  = '0';
    }
  });

  btnStop.addEventListener('click', () => {
    if (state !== 'idle') triggerStop();
  });

  // ── Theme controls ────────────────────────────────────────────────────────
  const btnSun  = document.getElementById('btnSun');
  const btnMoon = document.getElementById('btnMoon');

  function setTheme(t) {
    theme = t;
    localStorage.setItem('theme', t);
    document.body.classList.toggle('dark', t === 'dark');
    btnSun.classList.toggle('active',  t === 'light');
    btnMoon.classList.toggle('active', t === 'dark');
  }

  btnSun.addEventListener('click',  () => setTheme('light'));
  btnMoon.addEventListener('click', () => setTheme('dark'));

  // ── Settings carousel ─────────────────────────────────────────────────────
  const SETTINGS_PAGES = ['Display Mode', 'See Index?'];
  let settingPage = 0;
  const settingsLabel = document.getElementById('settingsLabel');
  const themeActions  = document.getElementById('themeActions');
  const indexActions  = document.getElementById('indexActions');

  function showSettingPage(i) {
    settingPage = (i + SETTINGS_PAGES.length) % SETTINGS_PAGES.length;
    settingsLabel.textContent  = SETTINGS_PAGES[settingPage];
    themeActions.style.display = settingPage === 0 ? 'flex' : 'none';
    indexActions.style.display = settingPage === 1 ? 'flex' : 'none';
  }

  document.getElementById('arrowUp').addEventListener('click',   () => showSettingPage(settingPage - 1));
  document.getElementById('arrowDown').addEventListener('click', () => showSettingPage(settingPage + 1));

  document.getElementById('btnGo').addEventListener('click', () => {
    if (window.parent !== window) window.parent.postMessage('goIndex', '*');
  });
  document.getElementById('btnStay').addEventListener('click', () => showSettingPage(0));

  // ── Navigate to Out (animated) ────────────────────────────────────────────
  window.navigateToOut = function () {
    if (document.body.classList.contains('exit-down')) return;
    timerColEl.style.transition = 'opacity 0.3s ease-in';
    timerColEl.style.opacity    = '0';
    sessionStorage.setItem('transition', 'fromSpeak');
    document.body.classList.add('exit-down');
    setTimeout(() => { window.location.href = '../out/'; }, 650);
  };

  // ── Navigate to Listen (animated) ─────────────────────────────────────────
  window.navigateToListen = function () {
    if (document.body.classList.contains('exit-right')) return;
    timerColEl.style.transition = 'opacity 0.35s ease-in, transform 0.5s cubic-bezier(0.4,0,0.8,1)';
    timerColEl.style.opacity    = '0';
    timerColEl.style.transform  = 'translateY(-50%) translateX(-40px)';
    sessionStorage.setItem('transition', 'fromSpeak');
    document.body.classList.add('exit-right');
    setTimeout(() => { window.location.href = '../listen/'; }, 650);
  };

  // ── Timer-col: align "9" with stage center ────────────────────────────────
  const timerColEl = document.getElementById('timerCol');
  function alignTimerCol() {
    const sr = document.querySelector('.stage').getBoundingClientRect();
    timerColEl.style.top = (sr.top + sr.height / 2) + 'px';
  }
  alignTimerCol();
  window.addEventListener('resize', alignTimerCol);

  // ── Navigate to Aloud (animated) ──────────────────────────────────────────
  window.navigateToAloud = function () {
    if (document.body.classList.contains('exit-up')) return;
    // Animate stage to match ALOUD's circle position (center at 94vh, sized as ALOUD canvas)
    const stageEl   = document.querySelector('.stage');
    const dstSize   = Math.round(Math.min(500, window.innerWidth * 0.85) * 0.67);
    const stageRect = stageEl.getBoundingClientRect();
    const offsetY   = Math.round(window.innerHeight * 0.94 - (stageRect.top + stageRect.height / 2));
    const scale     = dstSize / stageRect.width;
    stageEl.style.transition = 'transform 0.75s cubic-bezier(0.4,0,0.8,1), opacity 0.55s ease-in';
    stageEl.style.transform  = `translateY(${offsetY}px) scale(${scale.toFixed(4)})`;
    stageEl.style.opacity    = '0';
    timerColEl.style.transition = 'opacity 0.4s ease-in, transform 0.55s cubic-bezier(0.4,0,0.8,1)';
    timerColEl.style.opacity    = '0';
    timerColEl.style.transform  = 'translateY(-50%) translateX(-24px)';
    sessionStorage.setItem('transition', 'fromSpeak');
    document.body.classList.add('exit-up');
    setTimeout(() => { window.location.href = '../aloud/'; }, 700);
  };

  // ── Navigation ────────────────────────────────────────────────────────────
  (function () {
    function wire(id, href, swipeDir) {
      const el = document.getElementById(id);
      let tx = 0;
      el.addEventListener('click', () => { window.location.href = href; });
      el.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
      el.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (swipeDir === 'right' && dx >  30) window.location.href = href;
        if (swipeDir === 'left'  && dx < -30) window.location.href = href;
      }, { passive: true });
    }
    (function () {
      const el = document.getElementById('navToListen');
      let tx = 0;
      el.addEventListener('click', () => { window.navigateToListen(); });
      el.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
      el.addEventListener('touchend', e => {
        if (e.changedTouches[0].clientX - tx < -30) window.navigateToListen();
      }, { passive: true });
    }());

    // Vertical nav — swipe up on the label to go to Aloud
    (function () {
      const el = document.getElementById('navToAloud');
      let ty = 0;
      el.addEventListener('click', () => { window.navigateToAloud(); });
      el.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive: true });
      el.addEventListener('touchend', e => {
        if (ty - e.changedTouches[0].clientY > 30) window.navigateToAloud();
      }, { passive: true });
    }());
  }());

  // ── Entry animation from LISTEN ───────────────────────────────────────────
  function runEntryFromListen() {
    const stageEl     = document.querySelector('.stage');
    const appName     = document.querySelector('.app-name');
    const infoEl      = document.querySelector('.info');
    const settingsBar = document.querySelector('.settings-bar');
    const navAloud    = document.getElementById('navToAloud');
    const navListen   = document.getElementById('navToListen');
    const ease        = 'cubic-bezier(0.4,0,0.2,1)';

    stageEl.style.transition     = 'none';
    stageEl.style.transform      = 'rotate(180deg) scale(0.85)';
    stageEl.style.opacity        = '0';
    appName.style.transition     = 'none';   appName.style.opacity     = '0';
    infoEl.style.transition      = 'none';   infoEl.style.opacity      = '0';
    settingsBar.style.transition = 'none';   settingsBar.style.opacity = '0';
    navAloud.style.transition    = 'none';   navAloud.style.opacity    = '0';
    navListen.style.transition   = 'none';   navListen.style.opacity   = '0';
    timerColEl.style.transition  = 'none';
    timerColEl.style.opacity     = '0';
    timerColEl.style.transform   = 'translateY(-50%) translateX(-40px)';

    document.body.getBoundingClientRect();

    requestAnimationFrame(() => { requestAnimationFrame(() => {
      stageEl.style.transition     = `transform 0.6s ${ease}, opacity 0.35s ease-out 0.1s`;
      stageEl.style.transform      = '';
      stageEl.style.opacity        = '';
      appName.style.transition     = 'opacity 0.4s ease-out 0.15s';  appName.style.opacity     = '';
      infoEl.style.transition      = 'opacity 0.4s ease-out 0.2s';   infoEl.style.opacity      = '';
      settingsBar.style.transition = 'opacity 0.4s ease-out 0.1s';   settingsBar.style.opacity = '';
      navAloud.style.transition    = 'opacity 0.4s ease-out 0.35s';  navAloud.style.opacity    = '';
      navListen.style.transition   = 'opacity 0.4s ease-out 0.35s';  navListen.style.opacity   = '';
      setTimeout(() => {
        stageEl.style.cssText     = '';
        appName.style.cssText     = '';
        infoEl.style.cssText      = '';
        settingsBar.style.cssText = '';
        navAloud.style.cssText    = '';
        navListen.style.cssText   = '';
      }, 1000);
    }); });
  }

  // ── Entry animation from ALOUD ────────────────────────────────────────────
  function runEntryFromAloud() {
    const settingsBar = document.querySelector('.settings-bar');
    const stageEl     = document.querySelector('.stage');
    const appName     = document.querySelector('.app-name');
    const infoEl      = document.querySelector('.info');
    const navAloud    = document.getElementById('navToAloud');
    const navListen   = document.getElementById('navToListen');
    const ease        = 'cubic-bezier(0.4,0,0.2,1)';

    // Match ALOUD's circle: center at 94vh, canvas SIZE = Math.round(Math.min(500, w*0.85)*0.67)
    const srcSize   = Math.round(Math.min(500, window.innerWidth * 0.85) * 0.67);
    const stageRect = stageEl.getBoundingClientRect();
    const offsetY   = Math.round(window.innerHeight * 0.94 - (stageRect.top + stageRect.height / 2));
    const scale     = srcSize / stageRect.width;

    settingsBar.style.transition = 'none';
    settingsBar.style.transform  = 'translateX(-50%) translateY(220%)';
    settingsBar.style.opacity    = '0';
    stageEl.style.transition     = 'none';
    stageEl.style.transform      = `translateY(${offsetY}px) scale(${scale.toFixed(4)})`;
    stageEl.style.opacity        = '0';
    appName.style.transition     = 'none';  appName.style.opacity  = '0';
    infoEl.style.transition      = 'none';  infoEl.style.opacity   = '0';
    navAloud.style.transition    = 'none';  navAloud.style.opacity = '0';
    navListen.style.transition   = 'none';  navListen.style.opacity = '0';
    timerColEl.style.transition  = 'none';
    timerColEl.style.opacity     = '0';
    timerColEl.style.transform   = 'translateY(-50%) translateX(-24px)';

    document.body.getBoundingClientRect();

    requestAnimationFrame(() => { requestAnimationFrame(() => {
      settingsBar.style.transition = `transform 0.75s ${ease}, opacity 0.55s ease-out`;
      settingsBar.style.transform  = 'translateX(-50%)';
      settingsBar.style.opacity    = '';
      stageEl.style.transition     = `transform 0.9s ${ease}, opacity 0.2s ease-out`;
      stageEl.style.transform      = '';
      stageEl.style.opacity        = '';
      appName.style.transition     = 'opacity 0.5s ease-out 0.1s';   appName.style.opacity  = '';
      infoEl.style.transition      = 'opacity 0.5s ease-out 0.15s';  infoEl.style.opacity   = '';
      navAloud.style.transition    = 'opacity 0.5s ease-out 0.5s';   navAloud.style.opacity = '';
      navListen.style.transition   = 'opacity 0.5s ease-out 0.5s';   navListen.style.opacity = '';
      timerColEl.style.transition  = 'opacity 0.5s ease-out 0.3s, transform 0.6s cubic-bezier(0.4,0,0.2,1) 0.2s';
      timerColEl.style.opacity     = '';
      timerColEl.style.transform   = '';
      setTimeout(() => {
        settingsBar.style.cssText = '';
        stageEl.style.cssText     = '';
        appName.style.cssText     = '';
        infoEl.style.cssText      = '';
        navAloud.style.cssText    = '';
        navListen.style.cssText   = '';
        timerColEl.style.transition = '';
        timerColEl.style.opacity    = '';
        timerColEl.style.transform  = '';
        alignTimerCol();
      }, 1200);
    }); });
  }

  // ── Entry animation from OUT ──────────────────────────────────────────────
  function runEntryFromOut() {
    const stageEl     = document.querySelector('.stage');
    const appName     = document.querySelector('.app-name');
    const infoEl      = document.querySelector('.info');
    const settingsBar = document.querySelector('.settings-bar');
    const navAloud    = document.getElementById('navToAloud');
    const navListen   = document.getElementById('navToListen');
    const ease        = 'cubic-bezier(0.4,0,0.2,1)';

    stageEl.style.transition     = 'none';
    stageEl.style.transform      = 'translateY(80px) scale(0.45)';
    stageEl.style.opacity        = '0';
    appName.style.transition     = 'none';   appName.style.opacity     = '0';
    infoEl.style.transition      = 'none';   infoEl.style.opacity      = '0';
    settingsBar.style.transition = 'none';   settingsBar.style.opacity = '0';
    navAloud.style.transition    = 'none';   navAloud.style.opacity    = '0';
    navListen.style.transition   = 'none';   navListen.style.opacity   = '0';
    timerColEl.style.transition  = 'none';   timerColEl.style.opacity  = '0';

    document.body.getBoundingClientRect();

    requestAnimationFrame(() => { requestAnimationFrame(() => {
      stageEl.style.transition     = `transform 0.65s ${ease}, opacity 0.4s ease-out 0.05s`;
      stageEl.style.transform      = '';
      stageEl.style.opacity        = '';
      appName.style.transition     = 'opacity 0.4s ease-out 0.15s';  appName.style.opacity     = '';
      infoEl.style.transition      = 'opacity 0.4s ease-out 0.2s';   infoEl.style.opacity      = '';
      settingsBar.style.transition = 'opacity 0.4s ease-out 0.1s';   settingsBar.style.opacity = '';
      navAloud.style.transition    = 'opacity 0.4s ease-out 0.35s';  navAloud.style.opacity    = '';
      navListen.style.transition   = 'opacity 0.4s ease-out 0.35s';  navListen.style.opacity   = '';
      timerColEl.style.transition  = 'opacity 0.5s ease-out 0.3s, transform 0.6s cubic-bezier(0.4,0,0.2,1) 0.2s';
      timerColEl.style.opacity     = '';
      timerColEl.style.transform   = '';
      setTimeout(() => {
        stageEl.style.cssText     = '';
        appName.style.cssText     = '';
        infoEl.style.cssText      = '';
        settingsBar.style.cssText = '';
        navAloud.style.cssText    = '';
        navListen.style.cssText   = '';
        timerColEl.style.transition = '';
        timerColEl.style.opacity    = '';
        timerColEl.style.transform  = '';
        alignTimerCol();
      }, 1200);
    }); });
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  setTheme(localStorage.getItem('theme') || 'light');
  syncUI();
  loop();
  const _tr = sessionStorage.getItem('transition');
  if (_tr) {
    sessionStorage.removeItem('transition');
    if (_tr === 'fromAloud')  requestAnimationFrame(runEntryFromAloud);
    if (_tr === 'fromListen') requestAnimationFrame(runEntryFromListen);
    if (_tr === 'fromOut')    requestAnimationFrame(runEntryFromOut);
  }

})();

// ── Status icons ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  const siHp     = document.getElementById('siHeadphones');
  const hpPopup  = document.getElementById('hpPopup');
  const siMic    = document.getElementById('siMic');
  const micPopup = document.getElementById('micPopup');

  // ── Headphones ───────────────────────────────────────────────────────
  let selHpId = null;

  function setHp(on) {
    siHp.classList.toggle('si-on',  on);
    siHp.classList.toggle('si-off', !on);
  }
  async function refreshHp() {
    if (!navigator.mediaDevices) { setHp(false); return; }
    try {
      const devs = await navigator.mediaDevices.enumerateDevices();
      setHp(devs.filter(d => d.kind === 'audiooutput' && d.deviceId !== 'default').length > 0);
    } catch { setHp(false); }
  }
  refreshHp();
  if (navigator.mediaDevices) navigator.mediaDevices.addEventListener('devicechange', refreshHp);

  async function openHpPopup() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const outputs = devs.filter(d => d.kind === 'audiooutput');
    hpPopup.innerHTML = '';
    outputs.forEach((d, i) => {
      const row = document.createElement('div');
      row.className = 'mic-popup-item' + (d.deviceId === selHpId ? ' si-active' : '');
      row.textContent = d.label || ('Speaker ' + (i + 1));
      row.addEventListener('click', e => {
        e.stopPropagation();
        selHpId = d.deviceId;
        hpPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
        row.classList.add('si-active');
        hpPopup.style.display = 'none';
        siHp.classList.remove('si-off'); siHp.classList.add('si-on');
      });
      hpPopup.appendChild(row);
    });
    const hpMuteRow = document.createElement('div');
    hpMuteRow.className = 'mic-popup-item' + (selHpId === 'mute' ? ' si-active' : '');
    hpMuteRow.textContent = 'Mute';
    hpMuteRow.addEventListener('click', e => {
      e.stopPropagation();
      selHpId = 'mute';
      hpPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
      hpMuteRow.classList.add('si-active');
      hpPopup.style.display = 'none';
      siHp.classList.remove('si-on'); siHp.classList.add('si-off');
    });
    hpPopup.appendChild(hpMuteRow);
    hpPopup.style.display = 'block';
  }

  siHp.addEventListener('click', async e => {
    e.stopPropagation();
    if (hpPopup.style.display === 'block') { hpPopup.style.display = 'none'; return; }
    openHpPopup();
  });

  // ── Microphone ───────────────────────────────────────────────────────
  let micGranted = false;
  let selMicId   = null;

  function setMicOn(on) {
    siMic.classList.toggle('si-on',  on);
    siMic.classList.toggle('si-off', !on);
  }

  if (navigator.permissions) {
    navigator.permissions.query({ name: 'microphone' }).then(p => {
      if (p.state === 'granted') { micGranted = true; setMicOn(true); }
      p.addEventListener('change', () => { micGranted = p.state === 'granted'; setMicOn(micGranted); });
    }).catch(() => {});
  }

  async function requestMic() {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      s.getTracks().forEach(t => t.stop());
      micGranted = true; setMicOn(true);
    } catch { micGranted = false; setMicOn(false); }
  }

  async function openPopup() {
    const devs   = await navigator.mediaDevices.enumerateDevices();
    const inputs = devs.filter(d => d.kind === 'audioinput');
    micPopup.innerHTML = '';
    inputs.forEach((d, i) => {
      const row = document.createElement('div');
      row.className = 'mic-popup-item' + (d.deviceId === selMicId ? ' si-active' : '');
      row.textContent = d.label || ('Microphone ' + (i + 1));
      row.addEventListener('click', e => {
        e.stopPropagation();
        selMicId = d.deviceId;
        micPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
        row.classList.add('si-active');
        micPopup.style.display = 'none';
        setMicOn(true);
      });
      micPopup.appendChild(row);
    });
    const micMuteRow = document.createElement('div');
    micMuteRow.className = 'mic-popup-item' + (selMicId === 'mute' ? ' si-active' : '');
    micMuteRow.textContent = 'Mute';
    micMuteRow.addEventListener('click', e => {
      e.stopPropagation();
      selMicId = 'mute';
      micPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
      micMuteRow.classList.add('si-active');
      micPopup.style.display = 'none';
      setMicOn(false);
    });
    micPopup.appendChild(micMuteRow);
    micPopup.style.display = 'block';
  }

  siMic.addEventListener('click', async e => {
    e.stopPropagation();
    if (micPopup.style.display === 'block') { micPopup.style.display = 'none'; return; }
    if (!micGranted) await requestMic();
    if (micGranted) openPopup();
  });

  document.addEventListener('click', () => { micPopup.style.display = 'none'; hpPopup.style.display = 'none'; });

  // ── Location ─────────────────────────────────────────────────────────
  const siLocation = document.getElementById('siLocation');
  let locationOn = localStorage.getItem('locationEnabled') === 'true';

  function setLocation(on) {
    locationOn = on;
    localStorage.setItem('locationEnabled', String(on));
    siLocation.classList.toggle('si-on',  on);
    siLocation.classList.toggle('si-off', !on);
  }

  setLocation(locationOn);

  siLocation.addEventListener('click', () => {
    if (!locationOn) {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          () => setLocation(true),
          () => setLocation(false)
        );
      } else { setLocation(false); }
    } else {
      setLocation(false);
    }
  });
});

// ── Global swipe navigation ───────────────────────────────────────────────
(function () {
  let sx = 0, sy = 0, skip = false;
  document.addEventListener('touchstart', e => {
    skip = !!e.target.closest('button, .settings-bar, .extend-btn, .app-nav');
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (skip) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 60) return;
    if (ay > ax) {
      if (dy > 0) window.navigateToAloud();               // swipe down → aloud
    } else {
      if (dx < 0) window.navigateToListen();             // swipe left → listen
    }
  }, { passive: true });
}());
