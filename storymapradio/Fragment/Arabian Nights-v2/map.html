    .ctrl-btn:hover{background:var(--btn-hover)}
    .legend{position:fixed;bottom:16px;left:16px;background:var(--panel-bg);
      border:1px solid var(--panel-border);border-radius:12px;padding:12px 14px;
      font-family:Georgia,'Times New Roman',serif;font-size:12px;color:var(--text-muted);

      font-family:Georgia,'Times New Roman',serif;color:var(--text)}

    .vol-heading:first-child{margin-top:0}

const cv=document.getElementById('C'), cx=cv.getContext('2d');
const panel=document.getElementById('panel'), PC=document.getElementById('PC');
let sc=1, px=0, py=0;
const MINS=0.04, MAXS=6;
let hoverHex=null, activeStoryId=null;

// hex → {count, stories:[{id,t,u,n,d},...]}
const hexMap=new Map();
// story id → Set of hex keys
const storyHexSets=new Map();

/* ═══════════════════════ PROJECTION ═══════════════════════ */
function gk(lon,lat){return{x:(lon-LON0)*KPL,y:(lat-LAT0)*KPA}}
function ks(x,y){return{sx:x*sc+px,sy:-y*sc+py}}
function sk(sx,sy){return{x:(sx-px)/sc,y:-(sy-py)/sc}}
function gs(lon,lat){const k=gk(lon,lat);return ks(k.x,k.y)}

/* ═══════════════════════ HEX MATH ═══════════════════════ */
function h2k(q,r){return{x:R_KM*1.5*q,y:R_KM*S3*(r+q*.5)}}
function k2h(x,y){
  const q=(2/3*x)/R_KM, r=(-1/3*x+S3/3*y)/R_KM;
  return cr(q,r);
}
function cr(q,r){
  let x=q,z=r,y=-x-z;
  let rx=Math.round(x),ry=Math.round(y),rz=Math.round(z);
  const xd=Math.abs(rx-x),yd=Math.abs(ry-y),zd=Math.abs(rz-z);
  if(xd>yd&&xd>zd)rx=-ry-rz;else if(yd>zd)ry=-rx-rz;else rz=-rx-ry;
  return{q:rx,r:rz};
}
function hd(a,b){const as=-a.q-a.r,bs=-b.q-b.r;return Math.max(Math.abs(a.q-b.q),Math.abs(a.r-b.r),Math.abs(as-bs))}
function s2h(sx,sy){const k=sk(sx,sy);return k2h(k.x,k.y)}

function hexLine(a,b){
  const N=hd(a,b),out=[];
  for(let i=0;i<=N;i++){
    const t=N===0?0:i/N;
    out.push({hex:cr(a.q+(b.q-a.q)*t, a.r+(b.r-a.r)*t), t});
  }
  return out;
}

function hexRing(cq,cr2,rad){
  const out=[];
  for(let dq=-rad;dq<=rad;dq++){
    for(let dr=Math.max(-rad,-dq-rad);dr<=Math.min(rad,-dq+rad);dr++){
      out.push({q:cq+dq,r:cr2+dr});
    }
  }
  return out;
}

// Deterministic hash for organic edges
function hh(q,r){return(((q*73856093)^(r*19349663))>>>0)%100}

/* ═══════════════════════ COVERAGE COMPUTATION ═══════════════════════ */
function initCoverage(){
  hexMap.clear(); storyHexSets.clear();

  for(const story of filteredStories()){
    const myHexes=new Set();
    const wp=story.w;

    for(let i=0;i<wp.length;i++){
      if(wp.length===1 || i===wp.length-1 && wp.length>1){
        // Handle last waypoint (or single-waypoint blob)
        if(i>0) continue; // already handled by route
        if(wp.length===1){
          const km=gk(wp[0].lon,wp[0].lat);
          const ch=k2h(km.x,km.y);
          const rad=wp[0].r;
          for(const h of hexRing(ch.q,ch.r,rad)){
            const dist=hd(ch,h);
            // Organic edge: include edge hexes ~65% of the time
            if(dist<rad || (dist===rad && hh(h.q,h.r)<65)){
              myHexes.add(h.q+','+h.r);
            }
          }
        }
        continue;
      }

      // Route segment from wp[i] to wp[i+1]
      const km1=gk(wp[i].lon,wp[i].lat), km2=gk(wp[i+1].lon,wp[i+1].lat);
      const h1=k2h(km1.x,km1.y), h2=k2h(km2.x,km2.y);
      const line=hexLine(h1,h2);

      for(const{hex,t}of line){
        const rad=Math.round(wp[i].r+(wp[i+1].r-wp[i].r)*t);
        for(const h of hexRing(hex.q,hex.r,rad)){
          const dist=hd(hex,h);
          if(dist<rad || (dist===rad && hh(h.q,h.r)<65)){
            myHexes.add(h.q+','+h.r);
          }
        }
      }
    }

    storyHexSets.set(story.id,myHexes);

    for(const key of myHexes){
      if(!hexMap.has(key)) hexMap.set(key,{count:0,stories:[]});
      const entry=hexMap.get(key);
      entry.count++;
      entry.stories.push({id:story.id,t:story.t,u:story.u,n:story.n,d:story.d});
    }
  }
}

const HEX_COS=[], HEX_SIN=[];
for(let i=0;i<6;i++){const a=Math.PI/3*i;HEX_COS[i]=Math.cos(a);HEX_SIN[i]=Math.sin(a)}

// Pre-parse hex keys into numeric q,r arrays for fast iteration
let hexArr=[]; // [{q,r,key,entry}]
function buildHexArr(){
  hexArr=[];
  for(const[key,entry]of hexMap){
    const p=key.indexOf(',');
    hexArr.push({q:+key.slice(0,p),r:+key.slice(p+1),key,entry});
  }
}

function applyTheme(t){
  document.body.classList.toggle('dark',t==='dark');
  refreshCSS();
  if(_drawReady) draw();
}
// Initial theme — draw() not ready yet, just sets class + CSS cache
applyTheme(localStorage.getItem('theme')||'light');
window.addEventListener('storage',e=>{if(e.key==='theme')applyTheme(e.newValue||'light')});
document.getElementById('themeBtn').addEventListener('click',()=>{
  const n=isDark()?'light':'dark';localStorage.setItem('theme',n);applyTheme(n);
});

/* ═══════════════════════ DRAW (rAF debounced) ═══════════════════════ */
let _rafId=0;
_drawReady=true;
function draw(){
  if(!_rafId) _rafId=requestAnimationFrame(_draw);
}
function _draw(){
  _rafId=0;
  const dpr=devicePixelRatio||1, w=cv.width/dpr, h=cv.height/dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);

  // Water
  cx.fillStyle=_css.water; cx.fillRect(0,0,w,h);

  // Land — batch all land polygons into one path
  cx.fillStyle=_css.land; cx.strokeStyle=_css.landEdge; cx.lineWidth=1;
  cx.beginPath();
  for(const p of GEO.land){
    for(let i=0;i<p.length;i++){const s=gs(p[i][0],p[i][1]);i?cx.lineTo(s.sx,s.sy):cx.moveTo(s.sx,s.sy)}
    cx.closePath();
  }
  cx.fill();cx.stroke();

  // Water bodies
  cx.fillStyle=_css.water;
  cx.beginPath();
  for(const p of GEO.water){
    for(let i=0;i<p.length;i++){const s=gs(p[i][0],p[i][1]);i?cx.lineTo(s.sx,s.sy):cx.moveTo(s.sx,s.sy)}
    cx.closePath();
  }
  cx.fill();

  // Rivers
  cx.strokeStyle=_css.river; cx.lineWidth=Math.max(1,sc*3); cx.lineCap='round';cx.lineJoin='round';
  for(const r of GEO.rivers){
    cx.beginPath();
    for(let i=0;i<r.length;i++){const s=gs(r[i][0],r[i][1]);i?cx.lineTo(s.sx,s.sy):cx.moveTo(s.sx,s.sy)}
    cx.stroke();
  }

  const hR=R_KM*sc, hW=hR*2;

  // Background hex grid — only when zoomed enough, with tighter cell limit
  if(hW>8) drawGrid(w,h,hR);

  // Story hexes
  drawStory(hR,hW,w,h);

  // Labels
  if(hW>10) drawLabels(hW,hR);
}

function drawGrid(w,h,hR){
  const corners=[sk(0,0),sk(w,0),sk(0,h),sk(w,h)];
  const hc=corners.map(c=>k2h(c.x,c.y));
  let qn=Infinity,qx=-Infinity,rn=Infinity,rx=-Infinity;
  for(const c of hc){qn=Math.min(qn,c.q);qx=Math.max(qx,c.q);rn=Math.min(rn,c.r);rx=Math.max(rx,c.r)}
  qn-=2;qx+=2;rn-=2;rx+=2;
  if((qx-qn)*(rx-rn)>8000)return; // tighter limit

  cx.strokeStyle=_css.gridLine; cx.lineWidth=0.5; cx.setLineDash([]);
  cx.beginPath();
  const ww=w+hR*2,hh2=h+hR*2;
  for(let q=qn;q<=qx;q++){
    for(let r=rn;r<=rx;r++){
      const km=h2k(q,r), s=ks(km.x,km.y);
      if(s.sx<-hR*2||s.sx>ww||s.sy<-hR*2||s.sy>hh2)continue;
      const rr=hR-1;
      for(let i=0;i<6;i++){
        const x2=s.sx+rr*HEX_COS[i],y2=s.sy-rr*HEX_SIN[i];
        i?cx.lineTo(x2,y2):cx.moveTo(x2,y2);
      }
      cx.closePath();
    }
  }
  cx.stroke();
}

function densityColor(n){
  if(n>=10)return _css.d10;
  if(n>=5)return _css.d5;
  if(n>=3)return _css.d3;
  if(n>=2)return _css.d2;
  return _css.d1;
}

function drawStory(hR,hW,w,h){
  const dark=isDark();
  const hiSet=activeStoryId?storyHexSets.get(activeStoryId):null;
  const hiCol=_css.hi, hiStroke=_css.hiStroke, dimCol=_css.dim;
  const hovFill=dark?'rgba(250,190,70,.88)':'rgba(210,110,40,.88)';
  const hovStroke=dark?'rgba(255,220,100,.9)':'rgba(140,50,15,.9)';
  const defStroke=dark?'rgba(200,140,60,.3)':'rgba(100,40,15,.35)';
  const rr=hR-(hW>12?1:0);
  const useCircle=hW<5;
  const circR=Math.max(2.5,hR*.5);
  const margin=hR*2;

  // Batch dim hexes, batch normal hexes by density, draw highlighted/hovered individually
  // For simplicity and speed: single pass, skip off-screen
  for(let idx=0;idx<hexArr.length;idx++){
    const hx=hexArr[idx];
    const km=h2k(hx.q,hx.r);
    const sx=km.x*sc+px, sy=-km.y*sc+py;
    if(sx<-margin||sx>w+margin||sy<-margin||sy>h+margin) continue;

    const isHov=hoverHex&&hoverHex.q===hx.q&&hoverHex.r===hx.r;
    const isHi=hiSet&&hiSet.has(hx.key);
    const isDimmed=hiSet&&!isHi;

    let fill, stroke2, lw;
    if(isDimmed){fill=dimCol;stroke2=null;lw=0}
    else if(isHi){fill=hiCol;stroke2=hiStroke;lw=2}
    else if(isHov){fill=hovFill;stroke2=hovStroke;lw=2.5}
    else{fill=densityColor(hx.entry.count);stroke2=defStroke;lw=1}

    if(useCircle){
      cx.beginPath();cx.arc(sx,sy,circR,0,6.2832);
      cx.fillStyle=fill;cx.fill();
    } else {
      cx.beginPath();
      cx.moveTo(sx+rr*HEX_COS[0],sy-rr*HEX_SIN[0]);
      for(let i=1;i<6;i++) cx.lineTo(sx+rr*HEX_COS[i],sy-rr*HEX_SIN[i]);
      cx.closePath();
      cx.fillStyle=fill;cx.fill();
      if(lw>0){cx.strokeStyle=stroke2;cx.lineWidth=lw;cx.setLineDash([]);cx.stroke()}
    }
  }
}

function drawLabels(hW,hR){
  // Show city labels for major clusters
  const labels=[
    ['Baghdad',33.32,44.37],['Basra',30.51,47.78],['Cairo',30.04,31.24],
    ['Damascus',33.51,36.28],['Mosul',36.35,43.16],['Aleppo',36.2,37.13],
    ['Samarkand',39.65,66.96],['Kashgar',39.47,75.99],
    ['Isfahan',32.65,51.67],['Lake Van',38.5,43.3],
    ['Magnetic Mtn.',18.9,62.9],['Persian Gulf',26.55,52.1],
    // Expanded labels
    ['Constantinople',41.01,28.98],['Athens',37.97,23.72],
    ['Mecca',21.42,39.83],['Medina',24.47,39.61],
    ['Muscat',23.59,58.54],['Aden',12.78,45.02],
    ['Delhi',28.61,77.21],['Mumbai',19.08,72.88],
    ['Kabul',34.53,69.17],['Herat',34.35,62.2],
    ['Bukhara',39.77,64.42],['Merv',37.6,62.19],
    ['Jerusalem',31.77,35.23],['Hormuz',27.1,56.28],
    ['Alexandria',31.2,29.92],['Lahore',31.55,74.35],
    ['Karachi',24.86,67.01],['Khartoum',15.59,32.53],
    ['Mogadishu',2.05,45.32],['Socotra',12.5,54],
    ['Colombo',6.93,79.86],['Calicut',11.25,75.78],
    ['Shiraz',29.59,52.58],['Tabriz',38.08,46.29],
    ['Ankara',39.93,32.86],['Balkh',36.76,66.9]
  ];

  const fs=Math.max(12,Math.min(20,hW*.22));
  cx.textBaseline='middle';cx.textAlign='left';

  for(const[name,lat,lon]of labels){
    const s=gs(lon,lat);
    const lx=s.sx+hR+8, ly=s.sy;

    // City dot
    cx.beginPath();cx.arc(s.sx,s.sy,Math.max(3,hR*.18),0,Math.PI*2);
    cx.fillStyle=_css.labelCol;cx.fill();

    cx.font=`700 ${fs}px Georgia,"Times New Roman",serif`;
    const met=cx.measureText(name);

    cx.fillStyle=_css.labelBg;
    cx.beginPath();
    if(cx.roundRect) cx.roundRect(lx-5,ly-fs*.62,met.width+10,fs*1.24,5);
    else{cx.rect(lx-5,ly-fs*.62,met.width+10,fs*1.24)}
    cx.fill();

    cx.fillStyle=_css.labelCol;
    cx.fillText(name,lx,ly);
  }
}

/* ═══════════════════════ INPUT ═══════════════════════ */
const act=new Map();
let lm=null,ld=0,ds=null,dragging=false;

function gm(){const p=[...act.values()];return{x:p.reduce((s,a)=>s+a.x,0)/p.length,y:p.reduce((s,a)=>s+a.y,0)/p.length}}
function gd(){if(act.size<2)return 0;const[a,b]=[...act.values()];return Math.hypot(a.x-b.x,a.y-b.y)}

cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId);
  act.set(e.pointerId,{x:e.clientX,y:e.clientY});
  lm=gm();ld=gd();
  if(act.size===1){ds={x:e.clientX,y:e.clientY};dragging=false}
  cv.classList.add('grabbing');cv.classList.remove('pointer');
});
cv.addEventListener('pointermove',e=>{
  if(!act.has(e.pointerId))return;
  act.set(e.pointerId,{x:e.clientX,y:e.clientY});
  const m=gm(),d=gd();
  px+=m.x-lm.x;py+=m.y-lm.y;
  if(ld>4&&d>4){const p=sc;sc=Math.max(MINS,Math.min(MAXS,sc*(d/ld)));const r=sc/p;px=m.x+(px-m.x)*r;py=m.y+(py-m.y)*r}
  lm=m;ld=d;
  if(ds&&Math.hypot(e.clientX-ds.x,e.clientY-ds.y)>6)dragging=true;
  if(act.size===1)hoverHex=s2h(e.clientX,e.clientY);
  draw();
});
cv.addEventListener('pointerup',e=>{
  const ws=act.size===1;
  act.delete(e.pointerId);lm=act.size?gm():null;ld=gd();
  if(ws&&!dragging&&ds){
    const h=s2h(e.clientX,e.clientY),key=h.q+','+h.r;
    if(hexMap.has(key)){openPanel(key);}else{closePanel()}
  }
  ds=null;dragging=false;
  if(!act.size){cv.classList.remove('grabbing');uc(e.clientX,e.clientY)}
  draw();
});
cv.addEventListener('pointercancel',e=>{act.delete(e.pointerId);lm=null;ld=0;ds=null;dragging=false;cv.classList.remove('grabbing')});
cv.addEventListener('mousemove',e=>{
  if(act.size)return;
  const h=s2h(e.clientX,e.clientY);
  if(!hoverHex||h.q!==hoverHex.q||h.r!==hoverHex.r){hoverHex=h;draw()}
  uc(e.clientX,e.clientY);
});
cv.addEventListener('mouseleave',()=>{hoverHex=null;cv.classList.remove('pointer');draw()});
function uc(x,y){const h=s2h(x,y);cv.classList.toggle('pointer',hexMap.has(h.q+','+h.r))}

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:.89,p=sc;
  sc=Math.max(MINS,Math.min(MAXS,sc*f));
  const r=sc/p;px=e.clientX+(px-e.clientX)*r;py=e.clientY+(py-e.clientY)*r;
  draw();
},{passive:false});

/* ═══════════════════════ PANEL ═══════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function openPanel(key){
  const entry=hexMap.get(key);
  if(!entry)return;
  const[q,r]=key.split(',').map(Number);
  const km=h2k(q,r);
  const geo={lon:LON0+km.x/KPL,lat:LAT0+km.y/KPA};

  let html=`<h2>${entry.count} Tale${entry.count>1?'s':''} at This Hex</h2>`;
  html+=`<div class="meta">Lat ${geo.lat.toFixed(1)}&deg;, Lon ${geo.lon.toFixed(1)}&deg; &middot; Hex (${q}, ${r})</div>`;
  html+=`<div class="story-list">`;

  // Deduplicate by story id (a story only appears once per hex)
  const seen=new Set();
  for(const s of entry.stories){
    if(seen.has(s.id))continue;seen.add(s.id);
    const url=s.u.startsWith('http')?s.u:B+s.u;
    const isActive=activeStoryId===s.id;
    html+=`<div class="sc${isActive?' active':''}" data-sid="${esc(s.id)}">`;
    html+=`<div class="st">${esc(s.t)}</div>`;
    html+=`<div class="sn">${esc(s.n)}</div>`;
    html+=`<div class="sd">${esc(s.d)}</div>`;
    html+=`<a class="sl" href="${esc(url)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">Read on burtoniana.org &rarr;</a>`;
    html+=`</div>`;
  }
  html+=`</div>`;
  html+=`<div style="margin-top:18px;font-size:.78rem;color:var(--text-muted);line-height:1.4">`;
  html+=`Click a tale card to highlight its route on the map.<br>`;
  html+=`Source: <a href="${B}index.html" target="_blank" rel="noreferrer" style="color:var(--link)">Burton 1885</a> via burtoniana.org</div>`;

  PC.innerHTML=html;
  // Close index panel when hex panel opens
  indexPanel.classList.remove('open');
  indexBtn.classList.remove('active-btn');
  indexOpen=false;
  panel.classList.add('open');

  // Story card click → highlight route
  PC.querySelectorAll('.sc').forEach(el=>{
    el.addEventListener('click',function(ev){
      if(ev.target.tagName==='A')return;
      const sid=this.dataset.sid;
      activeStoryId=activeStoryId===sid?null:sid;
      // Re-render panel to update active state
      openPanel(key);
      draw();
    });
  });

  draw();
}

function closePanel(){
  activeStoryId=null;
  panel.classList.remove('open');
  draw();
}
document.getElementById('panelClose').addEventListener('click',closePanel);

/* ═══════════════════════ VOLUME FILTER ═══════════════════════ */
const VOLUMES=[
  {key:'s',  label:'Volume I \u2014 Nights 1\u2013100'},
  {key:'v2s',label:'Volume II \u2014 Nights 100\u2013200'},
  {key:'v3s',label:'Volume III \u2014 Nights 200\u2013270'},
  {key:'v4s',label:'Volume IV \u2014 Nights 270\u2013371'},
  {key:'v5s',label:'Volume V \u2014 Nights 371\u2013453'},
  {key:'v6s',label:'Volume VI \u2014 Nights 453\u2013567'},
  {key:'v7s',label:'Volumes VII\u2013VIII \u2014 Nights 567\u2013800'},
  {key:'v8s',label:'Volume VIII (cont.)'},
  {key:'v9s',label:'Volumes IX\u2013X \u2014 Nights 800\u20131001'},
  {key:'v10s',label:'Volume X (cont.)'}
];
// All volumes on by default
const volEnabled=new Set(VOLUMES.map(v=>v.key));
const filterPanel=document.getElementById('filterPanel');
const filterBtn=document.getElementById('filterBtn');
let filterOpen=false;

function storyVolKey(id){
  for(let i=VOLUMES.length-1;i>=0;i--){
    if(VOLUMES[i].key==='s'?(/^s\d/.test(id)&&!id.startsWith('v')):id.startsWith(VOLUMES[i].key)) return VOLUMES[i].key;
  }
  return 's';
}

function filteredStories(){
  return STORIES.filter(s=>volEnabled.has(storyVolKey(s.id)));
}

function buildFilterPanel(){
  let html='<h3>Filter by Volume</h3>';
  for(const vol of VOLUMES){
    const checked=volEnabled.has(vol.key)?'checked':'';
    html+='<label class="filter-row"><input type="checkbox" data-vk="'+vol.key+'" '+checked+'><span>'+vol.label+'</span></label>';
  }
  html+='<div class="filter-actions">';
  html+='<button class="filter-act" id="filterAll">All</button>';
  html+='<button class="filter-act" id="filterNone">None</button>';
  html+='</div>';
  const cnt=filteredStories().length;
  html+='<div class="filter-count">'+cnt+' of '+STORIES.length+' tales shown</div>';
  filterPanel.innerHTML=html;

  filterPanel.querySelectorAll('input[data-vk]').forEach(cb=>{
    cb.addEventListener('change',function(){
      if(this.checked) volEnabled.add(this.dataset.vk);
      else volEnabled.delete(this.dataset.vk);
      applyFilter();
    });
  });
  document.getElementById('filterAll').addEventListener('click',()=>{
    VOLUMES.forEach(v=>volEnabled.add(v.key));
    applyFilter();
  });
  document.getElementById('filterNone').addEventListener('click',()=>{
    volEnabled.clear();
    applyFilter();
  });
}

function applyFilter(){
  activeStoryId=null;
  initCoverage();
  buildHexArr();
  buildFilterPanel();
  if(indexOpen) buildIndexPanel();
  draw();
}

function toggleFilter(){
  filterOpen=!filterOpen;
  filterPanel.classList.toggle('open',filterOpen);
  filterBtn.classList.toggle('active-btn',filterOpen);
  if(filterOpen) buildFilterPanel();
}

filterBtn.addEventListener('click',toggleFilter);
// Close filter when clicking outside
document.addEventListener('click',e=>{
  if(filterOpen&&!filterPanel.contains(e.target)&&e.target!==filterBtn){
    filterOpen=false;
    filterPanel.classList.remove('open');
    filterBtn.classList.remove('active-btn');
  }
});

/* ═══════════════════════ INDEX PANEL ═══════════════════════ */
const indexPanel=document.getElementById('indexPanel');
const IPC=document.getElementById('IPC');
const indexBtn=document.getElementById('indexBtn');
let indexOpen=false;

function buildIndexPanel(){
  const visible=filteredStories();
  let html='<h2>Story Index</h2>';
  html+='<div class="idx-count">'+visible.length+' of '+STORIES.length+' tales shown</div>';

  for(const vol of VOLUMES){
    if(!volEnabled.has(vol.key)) continue;
    const group=visible.filter(s=>storyVolKey(s.id)===vol.key);
    if(!group.length) continue;

    html+='<div class="vol-heading">'+vol.label+'</div>';
    html+='<div class="story-list">';
    for(const s of group){
      const url=s.u.startsWith('http')?s.u:B+s.u;
      const isActive=activeStoryId===s.id;
      html+='<div class="sc'+(isActive?' active':'')+'" data-sid="'+esc(s.id)+'">';
      html+='<div class="st">'+esc(s.t)+'</div>';
      html+='<div class="sn">'+esc(s.n)+'</div>';
      html+='<div class="sd">'+esc(s.d)+'</div>';
      html+='<a class="sl" href="'+esc(url)+'" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">Read on burtoniana.org &rarr;</a>';
      html+='</div>';
    }
    html+='</div>';
  }

  html+='<div style="margin-top:18px;font-size:.78rem;color:var(--text-muted);line-height:1.4">';
  html+='Click a tale card to highlight its route on the map.<br>';
  html+='Source: <a href="'+B+'index.html" target="_blank" rel="noreferrer" style="color:var(--link)">Burton 1885</a> via burtoniana.org</div>';

  IPC.innerHTML=html;

  // Wire up story card clicks
  IPC.querySelectorAll('.sc').forEach(el=>{
    el.addEventListener('click',function(ev){
      if(ev.target.tagName==='A') return;
      const sid=this.dataset.sid;
      activeStoryId=activeStoryId===sid?null:sid;
      buildIndexPanel();
      draw();
    });
  });
}

function openIndexPanel(){
  // Close other panels
  panel.classList.remove('open');
  filterOpen=false;filterPanel.classList.remove('open');filterBtn.classList.remove('active-btn');
  buildIndexPanel();
  indexPanel.classList.add('open');
  indexBtn.classList.add('active-btn');
  indexOpen=true;
}

function closeIndexPanel(){
  indexPanel.classList.remove('open');
  indexBtn.classList.remove('active-btn');
  indexOpen=false;
  if(!panel.classList.contains('open')){activeStoryId=null;draw();}
}

indexBtn.addEventListener('click',()=>{
  if(indexOpen) closeIndexPanel(); else openIndexPanel();
});
document.getElementById('indexPanelClose').addEventListener('click',closeIndexPanel);

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();closeIndexPanel();filterOpen=false;filterPanel.classList.remove('open');filterBtn.classList.remove('active-btn');}});

/* ═══════════════════════ RESIZE / INIT ═══════════════════════ */
function resize(){
  const dpr=devicePixelRatio||1,w=innerWidth,h=innerHeight;
  cv.width=Math.round(w*dpr);cv.height=Math.round(h*dpr);
  cv.style.width=w+'px';cv.style.height=h+'px';
  draw();
}

function resetView(){
  const w=innerWidth,h=innerHeight;
  // Show from Cairo to Kashgar: center on ~50°E, 28°N
  sc=Math.min(w,h)/6300;
  if(sc<MINS)sc=MINS;
  const center=gk(50,28);
  px=w/2-center.x*sc; py=h/2+center.y*sc;
  draw();
}

document.getElementById('homeBtn').addEventListener('click',resetView);

initCoverage();
buildHexArr();
refreshCSS();
window.addEventListener('resize',resize);
resize();resetView();

// Count total story hex entries
let totalEntries=0;
for(const[,e]of hexMap)totalEntries+=e.count;
console.log(`Arabian Nights map: ${hexMap.size} unique hexes, ${totalEntries} story-hex entries across ${STORIES.length} tales`);

setTimeout(()=>{const h=document.getElementById('hint');if(h){h.style.transition='opacity 1s';h.style.opacity='0';setTimeout(()=>{if(h)h.style.display='none'},1000)}},4000);

}());
