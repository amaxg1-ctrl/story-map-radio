<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALONG</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ──────────────────────────────────────────────────── */
    :root {
      --bg-a: #eceef2; --bg-b: #d8dae1;
      --accent:        rgb(255,136,0);
      --accent-rgb:    255,136,0;
      --accent-glow:   rgba(255,136,0,0.38);
      --accent-ring:   rgba(255,136,0,0.13);
      --accent-bg:     rgba(255,136,0,0.16);
      --accent-border: rgba(255,136,0,0.55);
      --text:          rgba(88,90,102,0.82);
      --text-muted:    #b0b3bc;
      --status:        #c4c6ce;
      --btn-bg:        rgba(158,161,170,0.26);
      --btn-border:    rgba(255,255,255,0.55);
      --btn-inset:     rgba(255,255,255,0.45);
      --mark-base:     rgba(88,90,102,0.13);
      --mark-fill:     rgba(255,136,0,0.22);
      --mark-stroke:   rgba(255,255,255,0.30);
    }

    body.dark {
      --bg-a: #13141a; --bg-b: #0f1014;
      --accent:        rgb(160,80,255);
      --accent-rgb:    160,80,255;
      --accent-glow:   rgba(160,80,255,0.44);
      --accent-ring:   rgba(160,80,255,0.15);
      --accent-bg:     rgba(160,80,255,0.18);
      --accent-border: rgba(160,80,255,0.58);
      --text:          rgba(200,202,218,0.85);
      --text-muted:    rgba(140,142,158,0.75);
      --status:        rgba(120,122,138,0.75);
      --btn-bg:        rgba(42,44,58,0.55);
      --btn-border:    rgba(255,255,255,0.10);
      --btn-inset:     rgba(255,255,255,0.05);
      --mark-base:     rgba(200,202,218,0.10);
      --mark-fill:     rgba(160,80,255,0.22);
      --mark-stroke:   rgba(255,255,255,0.22);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(150deg, var(--bg-a) 0%, var(--bg-b) 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none; -webkit-user-select: none;
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ── App name ──────────────────────────────────────────────────────── */
    .app-super {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      font-size: 8px; font-weight: 400;
      letter-spacing: 0.45em; text-transform: uppercase;
      color: var(--text-muted); z-index: 50; opacity: 0.55;
      white-space: nowrap; transition: color 0.3s;
    }
    .app-name {
      position: fixed; top: 26px; left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: var(--text-muted); z-index: 50;
      transition: color 0.3s;
    }

    /* ── Status ────────────────────────────────────────────────────────── */
    .status-text {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
      font-size: 9.5px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--status); z-index: 50; white-space: nowrap;
      transition: color 0.3s;
    }

    /* ── Canvas — center at 94vh, only top dome visible ───────────────── */
    #wheelCanvas {
      position: fixed;
      left: 50%; top: 94vh;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Controls at circle midline ────────────────────────────────────── */
    .controls {
      position: fixed;
      top: 94vh; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; align-items: center; gap: 8px;
      z-index: 10;
    }

    .btn {
      position: relative; width: 58px; height: 58px; border-radius: 50%;
      border: 1.5px solid var(--btn-border);
      background: var(--btn-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, box-shadow 0.18s, color 0.18s, border-color 0.18s;
      box-shadow: 0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
      outline: none; -webkit-tap-highlight-color: transparent;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.12); }
    .btn.active {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
      box-shadow:
        0 0 0 3px var(--accent-ring),
        0 0 22px var(--accent-glow),
        0 2px 14px rgba(0,0,0,0.09),
        inset 0 1px 0 var(--btn-inset);
    }
    .btn:disabled { opacity: 0.28; cursor: default; }
    .btn { width: 39px; height: 39px; }
    .btn svg { width: 14px; height: 14px; flex-shrink: 0; pointer-events: none; }
    .btn-label {
      position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
      font-size: 7px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted); white-space: nowrap; pointer-events: none;
    }

    /* ── App nav ───────────────────────────────────────────────────────── */
    .app-nav {
      position: fixed; bottom: 10%;
      display: flex; align-items: center; gap: 2px;
      cursor: pointer; z-index: 50;
      color: var(--text-muted);
      opacity: 0.42; transition: opacity 0.2s, color 0.2s;
      padding: 8px;
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .app-nav:hover { opacity: 1; color: var(--text); }
    .app-nav-left  { left: 20px; }
    .app-nav svg   { flex-shrink: 0; }
    .app-nav-down  { left: 10%; flex-direction: column; }
    .app-nav-down span { writing-mode: vertical-rl; }
    .app-nav-down-right { right: 10%; flex-direction: column; }
    .app-nav-down-right span { writing-mode: vertical-rl; }

    /* ── Reading rectangle ─────────────────────────────────────────────── */
    .reading-container {
      position: fixed;
      top: 78px;
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: flex-end; gap: 10px;
      z-index: 20;
    }
    .reading-rect {
      background: var(--btn-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid var(--btn-border);
      border-radius: 20px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
      transition: height 0.5s cubic-bezier(0.4,0,0.2,1), background 0.3s, border-color 0.3s;
      overflow: hidden;
    }

    /* ── Map tile filter (greyscale, theme-aware) ───────────────────────── */
    :root      { --tile-filter: grayscale(1) brightness(1.08) contrast(0.88); }
    body.dark  { --tile-filter: grayscale(1) brightness(0.38) contrast(1.18) invert(1); }
    .reading-rect .leaflet-tile { filter: var(--tile-filter); transition: filter 0.3s; }
    .reading-rect .leaflet-control-attribution { display: none; }
    .reading-rect .leaflet-control-zoom { display: none; }
    .extend-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; padding: 6px;
      color: var(--text-muted); opacity: 0.42;
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      transition: opacity 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .extend-btn:hover { opacity: 1; color: var(--text); }
    .extend-btn span  { writing-mode: vertical-rl; }
    .extend-btn svg   { flex-shrink: 0; }
    .extend-btn.contracted { flex-direction: column-reverse; }

    /* ── Status icons ──────────────────────────────────────────────────── */
    .status-icons {
      position: fixed; top: 16px; right: 16px;
      display: flex; align-items: center; gap: 10px; z-index: 300;
    }
    .si {
      position: relative; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); opacity: 0.30;
      transition: opacity 0.2s, color 0.2s;
    }
    .si.si-on { color: var(--accent); opacity: 0.48; }
    .si svg { pointer-events: none; }
    .si > svg:not(.si-slash) { width: 100%; height: 100%; flex-shrink: 0; }
    .si-slash {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none; color: var(--text-muted);
    }
    .si.si-off .si-slash { display: block; }
    #siHeadphones { cursor: pointer; }
    #siLocation { cursor: pointer; }
    .si-hp-wrap  { position: relative; }
    .si-mic-wrap { position: relative; }
    .si-mic-btn {
      background: none; border: none; padding: 0;
      cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent;
    }
    .si-mic-btn:hover { opacity: 0.65 !important; }
    .mic-popup {
      display: none;
      position: absolute; top: calc(100% + 6px); right: 0;
      min-width: 160px;
      background: var(--btn-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--btn-border);
      border-radius: 12px; padding: 5px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.14); z-index: 400;
      transition: background 0.3s, border-color 0.3s;
    }
    .mic-popup-item {
      padding: 7px 10px;
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text); border-radius: 8px;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .mic-popup-item:hover { background: var(--accent-bg); color: var(--accent); }
    .mic-popup-item.si-active { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>

  <div class="app-super">Listen</div>
  <div class="app-name">Along</div>
  <div class="status-text" id="statusText">ready</div>

  <!-- ── Reading rectangle ─────────────────────────────────────────────── -->
  <div class="reading-container" id="readingContainer">
    <div class="reading-rect" id="readingRect"></div>
    <div class="extend-btn" id="btnExtend">
      <span id="extendLabel">EXPAND</span>
      <svg id="extendArrow" viewBox="0 0 10 10" width="11" height="11" fill="currentColor">
        <path d="M5,8 L1,4 L9,4 Z"/>
      </svg>
    </div>
  </div>

  <!-- Canvas — center at 94vh, only top dome visible -->
  <canvas id="wheelCanvas"></canvas>

  <!-- Controls at circle midline -->
  <div class="controls">

    <button class="btn" id="btnRewind" disabled title="Rewind">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M11 18V6l-8.5 6 8.5 6zm.5-6 8.5 6V6l-8.5 6z"/>
      </svg>
      <span class="btn-label">Rewind</span>
    </button>

    <button class="btn" id="btnPlay" title="Play">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <span class="btn-label">Play</span>
    </button>

    <button class="btn" id="btnPause" disabled title="Pause">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      <span class="btn-label">Pause</span>
    </button>

    <button class="btn" id="btnStop" disabled title="Stop">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
      <span class="btn-label">Stop</span>
    </button>

  </div>

  <!-- ── App nav — LISTEN↓ at bottom-right ────────────────────────────── -->
  <div class="app-nav app-nav-down-right" id="navToListen">
    <span>LISTEN</span>
    <svg viewBox="0 0 10 10" width="11" height="11" fill="currentColor">
      <path d="M5,8 L1,4 L9,4 Z"/>
    </svg>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  'use strict';

  // ── Canvas setup ──────────────────────────────────────────────────────────
  const canvas = document.getElementById('wheelCanvas');
  const ctx    = canvas.getContext('2d');
  const SIZE   = Math.round(Math.min(500, window.innerWidth * 0.85) * 0.67);
  const dpr    = window.devicePixelRatio || 1;
  canvas.width  = SIZE * dpr;
  canvas.height = SIZE * dpr;
  canvas.style.width  = SIZE + 'px';
  canvas.style.height = SIZE + 'px';
  ctx.scale(dpr, dpr);

  const CX      = SIZE / 2;
  const CY      = SIZE / 2;
  const WHEEL_R = Math.round(SIZE * 0.41);
  const TRI_S   = Math.round(SIZE * 0.030);
  const BASE_R  = WHEEL_R; // alias used by reading-rect anchor

  // ── App state ─────────────────────────────────────────────────────────────
  let state = 'idle'; // idle | playing | paused | rewinding

  // ── Theme ─────────────────────────────────────────────────────────────────
  let theme = 'light';

  function setTheme(t) {
    theme = t;
    document.body.classList.toggle('dark', t === 'dark');
  }

  function accentRGBA(a) {
    return theme === 'dark' ? `rgba(160,80,255,${a})` : `rgba(255,136,0,${a})`;
  }
  function ringColor() {
    return theme === 'dark' ? 'rgba(100,102,125,0.55)' : 'rgba(172,174,183,0.48)';
  }
  function triIdle() {
    return theme === 'dark' ? 'rgba(200,202,218,0.32)' : 'rgba(88,90,102,0.32)';
  }

  // ── Wheel state ────────────────────────────────────────────────────────────
  let wheelAngle = 0;
  let lastTs     = 0;
  const SPEED_CW  = 0.30;
  const SPEED_CCW = 0.90;

  // ── Scrub state ────────────────────────────────────────────────────────────
  let rewindMult  = 1;
  let scrubStartX = null;
  let scrubActive = false;

  const SCRUB_STEPS     = [0.5, 1, 1.5, 2];
  const SCRUB_THRESHOLD = 15;
  const SCRUB_ZONE      = 40;

  function scrubMult(dx) {
    const d = Math.max(0, -dx) - SCRUB_THRESHOLD;
    if (d <= 0) return 0;
    return SCRUB_STEPS[Math.min(SCRUB_STEPS.length - 1, Math.floor(d / SCRUB_ZONE))];
  }

  // ── Drawing ────────────────────────────────────────────────────────────────
  function drawWheel() {
    ctx.clearRect(0, 0, SIZE, SIZE);

    const active = (state === 'playing' || state === 'rewinding');

    const grd = ctx.createRadialGradient(CX, CY, WHEEL_R - 8, CX, CY, WHEEL_R + 28);
    grd.addColorStop(0, active ? accentRGBA(0.13) : 'rgba(185,187,196,0.11)');
    grd.addColorStop(1, active ? accentRGBA(0)    : 'rgba(185,187,196,0)');
    ctx.beginPath();
    ctx.arc(CX, CY, WHEEL_R + 28, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(CX, CY, WHEEL_R, 0, Math.PI * 2);
    ctx.strokeStyle = active ? accentRGBA(0.50) : ringColor();
    ctx.lineWidth   = active ? 1.8 : 1.5;
    if (active) { ctx.shadowBlur = 10; ctx.shadowColor = accentRGBA(0.45); }
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(wheelAngle);

    const tColor = active ? accentRGBA(0.88) : triIdle();
    if (active) { ctx.shadowBlur = 7; ctx.shadowColor = accentRGBA(0.55); }

    for (let i = 0; i < 3; i++) {
      ctx.save();
      ctx.rotate((i * 2 * Math.PI) / 3);
      ctx.beginPath();
      ctx.moveTo(WHEEL_R,          0);
      ctx.lineTo(WHEEL_R - TRI_S, -TRI_S);
      ctx.lineTo(WHEEL_R - TRI_S,  TRI_S);
      ctx.closePath();
      ctx.fillStyle = tColor;
      ctx.fill();
      ctx.restore();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ── Animation loop ─────────────────────────────────────────────────────────
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = lastTs ? (ts - lastTs) / 1000 : 0;
    lastTs = ts;
    if (state === 'playing')   wheelAngle += SPEED_CW               * dt;
    if (state === 'rewinding') wheelAngle -= SPEED_CCW * rewindMult * dt;
    drawWheel();
  }

  // ── Elements ──────────────────────────────────────────────────────────────
  const btnRewind = document.getElementById('btnRewind');
  const btnPlay   = document.getElementById('btnPlay');
  const btnPause  = document.getElementById('btnPause');
  const btnStop   = document.getElementById('btnStop');
  const statusEl  = document.getElementById('statusText');

  // ── UI sync ───────────────────────────────────────────────────────────────
  function syncUI() {
    [btnRewind, btnPlay, btnPause, btnStop].forEach(b => b.classList.remove('active'));
    switch (state) {
      case 'idle':
        btnRewind.disabled = true;  btnPlay.disabled  = false;
        btnPause.disabled  = true;  btnStop.disabled  = true;
        statusEl.textContent = 'ready';
        break;
      case 'playing':
        btnRewind.disabled = false; btnPlay.disabled  = true;
        btnPause.disabled  = false; btnStop.disabled  = false;
        btnPlay.classList.add('active');
        statusEl.textContent = 'playing';
        break;
      case 'paused':
        btnRewind.disabled = false; btnPlay.disabled  = false;
        btnPause.disabled  = false; btnStop.disabled  = false;
        btnPause.classList.add('active');
        statusEl.textContent = 'paused';
        break;
      case 'rewinding':
        btnRewind.disabled = true;  btnPlay.disabled  = false;
        btnPause.disabled  = true;  btnStop.disabled  = false;
        btnRewind.classList.add('active');
        statusEl.textContent = 'rewinding';
        break;
    }
  }

  // ── Button handlers ───────────────────────────────────────────────────────
  btnPlay.addEventListener('click', () => {
    if (state === 'idle' || state === 'paused' || state === 'rewinding') {
      state = 'playing'; syncUI();
    }
  });

  btnPause.addEventListener('click', () => {
    if (state === 'playing') { state = 'paused'; syncUI(); }
  });

  btnStop.addEventListener('click', () => {
    if (state !== 'idle') { state = 'idle'; syncUI(); }
  });

  // Rewind scrub — drag left for 0.5 / 1 / 1.5 / 2×
  btnRewind.addEventListener('pointerdown', e => {
    if (btnRewind.disabled) return;
    scrubStartX = e.clientX;
    scrubActive = false;
    btnRewind.setPointerCapture(e.pointerId);
  });

  btnRewind.addEventListener('pointermove', e => {
    if (scrubStartX === null) return;
    const mult = scrubMult(e.clientX - scrubStartX);
    if (mult > 0) {
      scrubActive = true;
      rewindMult  = mult;
      if (state === 'playing' || state === 'paused' || state === 'rewinding') {
        state = 'rewinding';
        syncUI();
        statusEl.textContent = `\u2190 ${rewindMult}\u00d7`;
      }
    }
  });

  btnRewind.addEventListener('pointerup', e => {
    if (scrubStartX === null) return;
    const wasScrub = scrubActive;
    scrubStartX = null;
    scrubActive = false;
    rewindMult  = 1;
    if (wasScrub) {
      if (state === 'rewinding') { state = 'paused'; syncUI(); }
    } else {
      if (state === 'playing' || state === 'paused') { state = 'rewinding'; syncUI(); }
    }
  });

  // ── Reading rectangle ─────────────────────────────────────────────────────
  const readingRect      = document.getElementById('readingRect');
  const readingContainer = document.getElementById('readingContainer');
  const btnExtend        = document.getElementById('btnExtend');
  const extendLabel      = document.getElementById('extendLabel');
  const extendArrow      = document.getElementById('extendArrow').querySelector('path');

  const RECT_W_BASE = Math.round(SIZE * 1.728);
  const RECT_W      = Math.round(RECT_W_BASE * 1.2);
  const RECT_H      = Math.round(SIZE * 1.15);
  const RECT_H_EXT  = Math.round(window.innerHeight * 0.65);

  const shift = Math.round((RECT_W - RECT_W_BASE) / 2);
  readingContainer.style.transform = `translateX(calc(-50% + ${shift}px))`;

  readingRect.style.width  = RECT_W + 'px';
  readingRect.style.height = RECT_H + 'px';

  let rectExtended = false;

  btnExtend.addEventListener('click', () => {
    rectExtended = !rectExtended;
    readingRect.style.height = rectExtended ? RECT_H_EXT + 'px' : RECT_H + 'px';
    extendLabel.textContent  = rectExtended ? 'CONTRACT' : 'EXPAND';
    btnExtend.classList.toggle('contracted', rectExtended);
    extendArrow.setAttribute('d', rectExtended ? 'M5,2 L1,6 L9,6 Z' : 'M5,8 L1,4 L9,4 Z');
    setTimeout(() => { if (alongMap) alongMap.invalidateSize(); }, 520);
  });

  // ── Map inside reading rectangle ──────────────────────────────────────────
  let alongMap = null;

  function initMap() {
    if (!navigator.geolocation) return; // no geolocation API — leave rect empty

    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lng } = pos.coords;

        alongMap = L.map(readingRect, {
          center: [lat, lng],
          zoom: 15,
          minZoom: 2,
          maxZoom: 19,
          zoomControl: false,
          attributionControl: false,
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
        }).addTo(alongMap);

        // Current location dot
        L.circleMarker([lat, lng], {
          radius: 7,
          color: 'rgba(255,255,255,0.9)',
          weight: 2,
          fillColor: theme === 'dark' ? 'rgb(160,80,255)' : 'rgb(255,136,0)',
          fillOpacity: 1,
        }).addTo(alongMap);
      },
      () => { /* denied or unavailable — leave rect empty */ },
      { timeout: 8000, maximumAge: 60000 }
    );
  }

  // ── Navigate to Listen (animated) ────────────────────────────────────────
  window.navigateToListen = function () {
    if (document.body.classList.contains('exit-down')) return;
    sessionStorage.setItem('transition', 'fromAlong');
    document.body.classList.add('exit-down');
    const ease = 'cubic-bezier(0.4,0,0.8,1)';
    const appName  = document.querySelector('.app-name');
    const statusTx = document.getElementById('statusText');
    const navEl    = document.getElementById('navToListen');
    const cvs      = document.getElementById('wheelCanvas');
    const ctrls    = document.querySelector('.controls');
    readingContainer.style.transition = `transform 0.75s ${ease}, opacity 0.55s ease-in`;
    readingContainer.style.transform  = `translateX(calc(-50% + ${shift}px)) translateY(-110vh)`;
    readingContainer.style.opacity    = '0';
    appName.style.transition  = 'opacity 0.28s ease-out';  appName.style.opacity  = '0';
    statusTx.style.transition = 'opacity 0.28s ease-out';  statusTx.style.opacity = '0';
    cvs.style.transition      = 'opacity 0.28s ease-out';  cvs.style.opacity      = '0';
    ctrls.style.transition    = 'opacity 0.28s ease-out';  ctrls.style.opacity    = '0';
    navEl.style.transition    = 'opacity 0.22s ease-out';  navEl.style.opacity    = '0';
    setTimeout(() => { window.location.href = '../listen/'; }, 700);
  };

  // ── Navigation ────────────────────────────────────────────────────────────
  (function () {
    const el = document.getElementById('navToListen');
    let ty = 0;
    el.addEventListener('click', () => { window.navigateToListen(); });
    el.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive: true });
    el.addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - ty > 30) window.navigateToListen();
    }, { passive: true });
  }());

  // ── Entry animation from LISTEN ───────────────────────────────────────────
  function runEntryFromListen() {
    const appName  = document.querySelector('.app-name');
    const statusTx = document.getElementById('statusText');
    const navEl    = document.getElementById('navToListen');
    const cvs      = document.getElementById('wheelCanvas');
    const ctrls    = document.querySelector('.controls');
    const ease     = 'cubic-bezier(0.4,0,0.2,1)';

    readingContainer.style.transition = 'none';
    readingContainer.style.transform  = `translateX(calc(-50% + ${shift}px)) translateY(-110vh)`;
    readingContainer.style.opacity    = '0';
    appName.style.transition  = 'none';  appName.style.opacity  = '0';
    appName.style.transform   = 'translateX(-50%) translateY(-50px)';
    statusTx.style.transition = 'none';  statusTx.style.opacity = '0';
    statusTx.style.transform  = 'translateX(-50%) translateY(-50px)';
    navEl.style.transition    = 'none';  navEl.style.opacity    = '0';
    cvs.style.transition      = 'none';  cvs.style.opacity      = '0';
    ctrls.style.transition    = 'none';  ctrls.style.opacity    = '0';
    readingContainer.getBoundingClientRect();

    requestAnimationFrame(() => { requestAnimationFrame(() => {
      readingContainer.style.transition = `transform 0.9s ${ease}, opacity 0.55s ease-out`;
      readingContainer.style.transform  = `translateX(calc(-50% + ${shift}px))`;
      readingContainer.style.opacity    = '';
      appName.style.transition  = `transform 0.7s ${ease} 0.08s, opacity 0.5s ease-out 0.08s`;
      appName.style.transform   = 'translateX(-50%)';  appName.style.opacity  = '';
      statusTx.style.transition = `transform 0.7s ${ease} 0.14s, opacity 0.5s ease-out 0.14s`;
      statusTx.style.transform  = 'translateX(-50%)';  statusTx.style.opacity = '';
      cvs.style.transition      = 'opacity 0.6s ease-out 0.3s';  cvs.style.opacity   = '';
      ctrls.style.transition    = 'opacity 0.6s ease-out 0.3s';  ctrls.style.opacity = '';
      navEl.style.transition    = 'opacity 0.5s ease-out 0.5s';  navEl.style.opacity = '';
      setTimeout(() => {
        readingContainer.style.transition = '';
        readingContainer.style.transform  = `translateX(calc(-50% + ${shift}px))`;
        appName.style.cssText  = '';
        statusTx.style.cssText = '';
        navEl.style.cssText    = '';
        cvs.style.transition   = '';  cvs.style.opacity   = '';
        ctrls.style.transition = '';  ctrls.style.opacity = '';
      }, 1200);
    }); });
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  setTheme(localStorage.getItem('theme') || 'light');
  syncUI();
  requestAnimationFrame(loop);
  initMap();
  if (sessionStorage.getItem('transition') === 'fromListen') {
    sessionStorage.removeItem('transition');
    requestAnimationFrame(runEntryFromListen);
  }

}());

// ── Status icons ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  const siHp     = document.getElementById('siHeadphones');
  const hpPopup  = document.getElementById('hpPopup');
  const siMic    = document.getElementById('siMic');
  const micPopup = document.getElementById('micPopup');

  // ── Headphones ───────────────────────────────────────────────────────
  let selHpId = null;

  function setHp(on) {
    siHp.classList.toggle('si-on',  on);
    siHp.classList.toggle('si-off', !on);
  }
  async function refreshHp() {
    if (!navigator.mediaDevices) { setHp(false); return; }
    try {
      const devs = await navigator.mediaDevices.enumerateDevices();
      setHp(devs.filter(d => d.kind === 'audiooutput' && d.deviceId !== 'default').length > 0);
    } catch { setHp(false); }
  }
  refreshHp();
  if (navigator.mediaDevices) navigator.mediaDevices.addEventListener('devicechange', refreshHp);

  async function openHpPopup() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const outputs = devs.filter(d => d.kind === 'audiooutput');
    hpPopup.innerHTML = '';
    outputs.forEach((d, i) => {
      const row = document.createElement('div');
      row.className = 'mic-popup-item' + (d.deviceId === selHpId ? ' si-active' : '');
      row.textContent = d.label || ('Speaker ' + (i + 1));
      row.addEventListener('click', e => {
        e.stopPropagation();
        selHpId = d.deviceId;
        hpPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
        row.classList.add('si-active');
        hpPopup.style.display = 'none';
        setHp(true);
      });
      hpPopup.appendChild(row);
    });
    const hpMuteRow = document.createElement('div');
    hpMuteRow.className = 'mic-popup-item' + (selHpId === 'mute' ? ' si-active' : '');
    hpMuteRow.textContent = 'Mute';
    hpMuteRow.addEventListener('click', e => {
      e.stopPropagation();
      selHpId = 'mute';
      hpPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
      hpMuteRow.classList.add('si-active');
      hpPopup.style.display = 'none';
      setHp(false);
    });
    hpPopup.appendChild(hpMuteRow);
    hpPopup.style.display = 'block';
  }

  siHp.addEventListener('click', async e => {
    e.stopPropagation();
    if (hpPopup.style.display === 'block') { hpPopup.style.display = 'none'; return; }
    openHpPopup();
  });

  // ── Microphone ───────────────────────────────────────────────────────
  let micGranted = false;
  let selMicId   = null;

  function setMicOn(on) {
    siMic.classList.toggle('si-on',  on);
    siMic.classList.toggle('si-off', !on);
  }

  if (navigator.permissions) {
    navigator.permissions.query({ name: 'microphone' }).then(p => {
      if (p.state === 'granted') { micGranted = true; setMicOn(true); }
      p.addEventListener('change', () => { micGranted = p.state === 'granted'; setMicOn(micGranted); });
    }).catch(() => {});
  }

  async function requestMic() {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      s.getTracks().forEach(t => t.stop());
      micGranted = true; setMicOn(true);
    } catch { micGranted = false; setMicOn(false); }
  }

  async function openPopup() {
    const devs   = await navigator.mediaDevices.enumerateDevices();
    const inputs = devs.filter(d => d.kind === 'audioinput');
    micPopup.innerHTML = '';
    inputs.forEach((d, i) => {
      const row = document.createElement('div');
      row.className = 'mic-popup-item' + (d.deviceId === selMicId ? ' si-active' : '');
      row.textContent = d.label || ('Microphone ' + (i + 1));
      row.addEventListener('click', e => {
        e.stopPropagation();
        selMicId = d.deviceId;
        micPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
        row.classList.add('si-active');
        micPopup.style.display = 'none';
        setMicOn(true);
      });
      micPopup.appendChild(row);
    });
    const micMuteRow = document.createElement('div');
    micMuteRow.className = 'mic-popup-item' + (selMicId === 'mute' ? ' si-active' : '');
    micMuteRow.textContent = 'Mute';
    micMuteRow.addEventListener('click', e => {
      e.stopPropagation();
      selMicId = 'mute';
      micPopup.querySelectorAll('.mic-popup-item').forEach(r => r.classList.remove('si-active'));
      micMuteRow.classList.add('si-active');
      micPopup.style.display = 'none';
      setMicOn(false);
    });
    micPopup.appendChild(micMuteRow);
    micPopup.style.display = 'block';
  }

  siMic.addEventListener('click', async e => {
    e.stopPropagation();
    if (micPopup.style.display === 'block') { micPopup.style.display = 'none'; return; }
    if (!micGranted) await requestMic();
    if (micGranted) openPopup();
  });

  document.addEventListener('click', () => { micPopup.style.display = 'none'; hpPopup.style.display = 'none'; });

  // ── Location ─────────────────────────────────────────────────────────
  const siLocation = document.getElementById('siLocation');
  let locationOn = localStorage.getItem('locationEnabled') === 'true';

  function setLocation(on) {
    locationOn = on;
    localStorage.setItem('locationEnabled', String(on));
    siLocation.classList.toggle('si-on',  on);
    siLocation.classList.toggle('si-off', !on);
  }

  setLocation(locationOn);

  siLocation.addEventListener('click', () => {
    if (!locationOn) {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          () => setLocation(true),
          () => setLocation(false)
        );
      } else { setLocation(false); }
    } else {
      setLocation(false);
    }
  });
});

// ── Global swipe navigation ───────────────────────────────────────────────
(function () {
  let sx = 0, sy = 0, skip = false;
  document.addEventListener('touchstart', e => {
    skip = !!e.target.closest('button, .extend-btn, .app-nav');
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (skip) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 60) return;
    if (ay > ax && dy < 0) window.navigateToListen();           // swipe up → listen
  }, { passive: true });
}());
