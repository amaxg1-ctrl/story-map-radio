<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>storymaprad.io</title>
  <style>
    @font-face {
      font-family: 'Chicago';
      src: url('https://cdn.jsdelivr.net/gh/pbitutsky/Chicago-Bitmap-Font@master/Chicago.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/pbitutsky/Chicago-Bitmap-Font@master/Chicago.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-a: #eceef2;
      --bg-b: #d8dae1;
      --text-color: rgba(88,90,102,0.85);
      --text-muted: rgba(88,90,102,0.45);
      --card-bg: rgba(158,161,170,0.12);
      --card-border: rgba(88,90,102,0.15);
      --card-hover-bg: rgba(158,161,170,0.22);
    }

    body.dark {
      --bg-a: #13141a;
      --bg-b: #0f1014;
      --text-color: rgba(255,255,255,0.82);
      --text-muted: rgba(255,255,255,0.32);
      --card-bg: rgba(42,44,58,0.40);
      --card-border: rgba(255,255,255,0.10);
      --card-hover-bg: rgba(42,44,58,0.65);
    }

    html, body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(150deg, var(--bg-a) 0%, var(--bg-b) 100%);
      transition: background 0.3s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo {
      font-family: 'Chicago', 'ChicagoFLF', 'Geneva', 'Charcoal', monospace;
      font-size: clamp(28px, 6vw, 64px);
      color: var(--text-color);
      letter-spacing: 0.04em;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      transition: color 0.3s;
    }

    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      animation: bob 2s ease-in-out infinite;
    }

    .scroll-hint svg {
      width: 20px;
      height: 20px;
    }

    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(6px); }
    }

    .nav-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 60px 32px;
      flex-wrap: wrap;
    }

    .nav-card {
      width: 260px;
      height: 320px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-card:hover {
      background: var(--card-hover-bg);
      transform: scale(1.04);
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    .nav-card:active {
      transform: scale(0.98);
    }

    .card-hex {
      width: 100px;
      height: 116px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-hex-inner {
      width: 92%;
      height: 92%;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--card-bg);
    }

    .card-name {
      font-family: 'Chicago', 'ChicagoFLF', 'Geneva', 'Charcoal', monospace;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-color);
      transition: color 0.3s;
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="logo">storymaprad.io</div>
    <div class="scroll-hint">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 16l-6-6h12z"/>
      </svg>
    </div>
  </section>

  <section class="nav-section">
    <a class="nav-card" href="./Fragment/audio-story-ecosystem-v2/fragment-index.html">
      <div class="card-hex"><div class="card-hex-inner"></div></div>
      <div class="card-name">Fragment</div>
    </a>
    <a class="nav-card" href="./Elocute/index-elocute.html">
      <div class="card-hex"><div class="card-hex-inner"></div></div>
      <div class="card-name">Elocute</div>
    </a>
    <a class="nav-card" href="./stream/index.html">
      <div class="card-hex"><div class="card-hex-inner"></div></div>
      <div class="card-name">Stream</div>
    </a>
  </section>

<script>
(function () {
  'use strict';

  function applyTheme(t) {
    document.body.classList.toggle('dark', t === 'dark');
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  window.addEventListener('storage', e => {
    if (e.key === 'theme') applyTheme(e.newValue || 'light');
  });
  window.addEventListener('focus', () => {
    applyTheme(localStorage.getItem('theme') || 'light');
  });
}());
</script>
</body>
</html>
