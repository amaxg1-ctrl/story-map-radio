<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRACE</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-a: #eceef2; --bg-b: #d8dae1;
      --text:       rgba(88,90,102,0.82);
      --text-muted: #b0b3bc;
      --btn-bg:     rgba(158,161,170,0.26);
      --btn-border: rgba(255,255,255,0.55);
      --btn-inset:  rgba(255,255,255,0.45);
      --label:      rgba(88,90,102,0.55);
      --tile-filter: grayscale(1) brightness(1.08) contrast(0.88);
    }

    body.dark {
      --bg-a: #13141a; --bg-b: #0f1014;
      --text:       rgba(200,202,218,0.85);
      --text-muted: rgba(140,142,158,0.75);
      --btn-bg:     rgba(42,44,58,0.55);
      --btn-border: rgba(255,255,255,0.10);
      --btn-inset:  rgba(255,255,255,0.05);
      --label:      rgba(255,255,255,0.30);
      --tile-filter: grayscale(1) brightness(0.38) contrast(1.18) invert(1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none; -webkit-user-select: none;
    }

    #map {
      width: 100%; height: 100%;
    }

    #map .leaflet-tile {
      filter: var(--tile-filter);
      transition: filter 0.3s;
    }

    .leaflet-control-attribution {
      font-size: 9px;
      opacity: 0.30;
      background: transparent !important;
      color: var(--label) !important;
    }

    .leaflet-control-zoom a {
      color: var(--label) !important;
      background: var(--btn-bg) !important;
      border-color: var(--btn-border) !important;
    }

    /* ── App label ──────────────────────────────────────────────────────── */
    .app-name {
      position: fixed;
      top: 26px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: var(--label);
      transition: color 0.3s;
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Settings bar ───────────────────────────────────────────────────── */
    .settings-bar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0;
      background: var(--btn-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--btn-border); border-radius: 40px;
      padding: 5px 6px 5px 10px; z-index: 1000;
      box-shadow: 0 4px 28px rgba(0,0,0,0.12);
      transition: background 0.3s, border-color 0.3s;
    }

    body.dark .settings-bar { opacity: 0.42; transition: opacity 0.25s; }
    body.dark .settings-bar:hover,
    body.dark .settings-bar.lit { opacity: 1; }

    .settings-arrows {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      margin-right: 10px;
    }

    .arrow-btn {
      width: 20px; height: 19px; border-radius: 4px; border: none;
      background: transparent; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      padding: 0; transition: color 0.18s; -webkit-tap-highlight-color: transparent;
    }
    .arrow-btn:hover { color: var(--text); }
    .arrow-btn svg { width: 9px; height: 9px; pointer-events: none; }

    .settings-label {
      font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); min-width: 108px; text-align: center;
      transition: color 0.3s;
    }

    .settings-actions { display: flex; gap: 6px; margin-left: 10px; }

    .action-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1.5px solid var(--btn-border);
      background: var(--btn-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, box-shadow 0.18s, color 0.18s, border-color 0.18s;
      box-shadow: 0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
      outline: none; -webkit-tap-highlight-color: transparent;
    }
    .action-btn svg { width: 20px; height: 20px; pointer-events: none; }

    .sun-btn  { color: rgb(255,136,0); }
    .moon-btn { color: rgb(160,80,255); }

    .sun-btn.active {
      background: rgba(255,136,0,0.16); border-color: rgba(255,136,0,0.55);
      box-shadow: 0 0 0 3px rgba(255,136,0,0.13), 0 0 18px rgba(255,136,0,0.40),
                  0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
    }
    .moon-btn.active {
      background: rgba(160,80,255,0.16); border-color: rgba(160,80,255,0.55);
      box-shadow: 0 0 0 3px rgba(160,80,255,0.13), 0 0 18px rgba(160,80,255,0.44),
                  0 2px 14px rgba(0,0,0,0.09), inset 0 1px 0 var(--btn-inset);
    }

    #btnGo {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      color: rgba(160,80,255,0.62);
      border-color: rgba(160,80,255,0.28);
      background: rgba(160,80,255,0.08);
    }
    #btnStay {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      color: rgba(255,136,0,0.62);
      border-color: rgba(255,136,0,0.28);
      background: rgba(255,136,0,0.08);
    }

    /* ── Country hover popup ─────────────────────────────────────────── */
    .trace-popup {
      pointer-events: none;
      z-index: 800;
    }
    .trace-popup .leaflet-popup-content-wrapper {
      background: var(--bg-a);
      border: 1px solid var(--btn-border);
      border-radius: 14px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.18);
      padding: 0;
      pointer-events: none;
    }
    .trace-popup .leaflet-popup-tip {
      background: var(--bg-a);
      border: 1px solid var(--btn-border);
    }
    .trace-popup .leaflet-popup-content {
      margin: 10px 12px;
      min-width: 180px;
    }
    .trace-popup-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }
    .trace-popup-box {
      background: var(--btn-bg);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 5px;
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1.4;
    }
    .trace-popup-box:last-child { margin-bottom: 0; }
  </style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  const btnMoon = document.getElementById('btnMoon');

  function setTheme(t) {
    localStorage.setItem('theme', t);
    document.body.classList.toggle('dark', t === 'dark');
    btnSun.classList.toggle('active',  t === 'light');
    btnMoon.classList.toggle('active', t === 'dark');
  }

  setTheme(localStorage.getItem('theme') || 'light');
  window.addEventListener('storage', e => {
    if (e.key === 'theme') setTheme(e.newValue || 'light');
  });

  btnSun.addEventListener('click',  () => setTheme('light'));
  btnMoon.addEventListener('click', () => setTheme('dark'));

  // ── Settings carousel ──────────────────────────────────────────────────────
  const PAGES = ['APPEARANCE', 'NAVIGATION'];
  let settingPage = 0;

  function showSettingPage(n) {
    settingPage = ((n % PAGES.length) + PAGES.length) % PAGES.length;
    document.getElementById('settingsLabel').textContent = PAGES[settingPage];
    document.getElementById('themeActions').style.display  = settingPage === 0 ? '' : 'none';
    document.getElementById('indexActions').style.display  = settingPage === 1 ? '' : 'none';
  }

  document.getElementById('arrowUp').addEventListener('click',   () => showSettingPage(settingPage - 1));
  document.getElementById('arrowDown').addEventListener('click', () => showSettingPage(settingPage + 1));

  document.getElementById('btnGo').addEventListener('click', () => {
    if (window.parent !== window) { window.parent.postMessage('goIndex', '*'); return; }
    window.location.href = '../fragment-index.html';
  });
  document.getElementById('btnStay').addEventListener('click', () => showSettingPage(0));

    const bar = document.querySelector('.settings-bar');

      bar.classList.add('lit');
      clearTimeout(timer);
      timer = setTimeout(() => bar.classList.remove('lit'), 2200);

  // ── Colour palette for countries ──────────────────────────────────────────
  const COLORS = [
    '#c45828','#a04422','#ba6036','#cc7e4c','#d89862',
    '#e2ae74','#7a3814','#944e2a','#ae6840','#c88458',

  ];
  const COLORS_DARK = [

    '#9a66da','#3a0860','#4e1880','#62289a','#7640b0',

  ];

  function getCountryColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
    const isDark = document.body.classList.contains('dark');
    const pal = isDark ? COLORS_DARK : COLORS;
    return pal[Math.abs(h) % pal.length];
  }

  // ── Popup builder ─────────────────────────────────────────────────────────
  function buildPopupHTML(name, items) {
    let html = '<div class="trace-popup-title">' + name + '</div>';
    items.forEach(item => {
      html += '<div class="trace-popup-box">' + item + '</div>';
    });
    return html;
  }

  // ── Lookup helper (try multiple name variants) ────────────────────────────
  function lookupCountry(props) {
    const names = [
      props.ADMIN, props.NAME, props.NAME_LONG, props.name,
      props.NAME_EN, props.FORMAL_EN, props.BRK_NAME,
    ].filter(Boolean);
    for (const n of names) {
      if (COUNTRY_DATA[n]) return { name: n, items: COUNTRY_DATA[n] };
    }
    return null;
  }

  // ── Load GeoJSON and render ───────────────────────────────────────────────
  let geoLayer = null;
  let activePopup = null;

  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => r.json())
    .then(topo => topojsonFeature(topo, topo.objects.countries))
    .then(geojson => {
      if (!geojson || !geojson.features) return;
      renderCountries(geojson);
    })
    .catch(err => console.warn('Could not load country boundaries', err));

  // TopoJSON → GeoJSON converter (inline, no dependency)
  function topojsonFeature(topology, object) {
    // Minimal topojson decode
    const arcs = topology.arcs;
    const tf = topology.transform;
    const scale = tf ? tf.scale : [1, 1];
    const translate = tf ? tf.translate : [0, 0];

    function decodeArc(arc) {
      let x = 0, y = 0;
      return arc.map(p => {
        x += p[0]; y += p[1];
        return [x * scale[0] + translate[0], y * scale[1] + translate[1]];
      });
    }

    const decodedArcs = arcs.map(decodeArc);

    function arcCoords(idx) {
      if (idx >= 0) return decodedArcs[idx].slice();
      const a = decodedArcs[~idx].slice().reverse();
      return a;
    }

      let coords = [];
      ring.forEach(idx => {
        const c = arcCoords(idx);
        if (coords.length > 0) c.shift();
        coords = coords.concat(c);
      });
      return coords.map(c => [c[1], c[0]]); // [lat, lng] for Leaflet
    }

    function geoCoords(arcs, type) {
      if (type === 'Polygon') return arcs.map(ringCoords);
      if (type === 'MultiPolygon') return arcs.map(poly => poly.map(ringCoords));
      return [];
    }

    // Country name lookup from numeric ID
    const ID_NAMES = {4:'Afghanistan',8:'Albania',12:'Algeria',24:'Angola',32:'Argentina',36:'Australia',40:'Austria',50:'Bangladesh',112:'Belarus',56:'Belgium',84:'Belize',204:'Benin',68:'Bolivia',70:'Bosnia and Herzegovina',72:'Botswana',76:'Brazil',100:'Bulgaria',854:'Burkina Faso',108:'Burundi',116:'Cambodia',120:'Cameroon',124:'Canada',148:'Chad',152:'Chile',156:'China',170:'Colombia',178:'Republic of the Congo',180:'Democratic Republic of the Congo',188:'Costa Rica',191:'Croatia',192:'Cuba',203:'Czechia',208:'Denmark',218:'Ecuador',818:'Egypt',222:'El Salvador',232:'Eritrea',233:'Estonia',231:'Ethiopia',246:'Finland',250:'France',270:'Gambia',268:'Georgia',276:'Germany',288:'Ghana',300:'Greece',320:'Guatemala',324:'Guinea',624:'Guinea-Bissau',332:'Haiti',340:'Honduras',348:'Hungary',352:'Iceland',356:'India',360:'Indonesia',364:'Iran',368:'Iraq',372:'Ireland',376:'Israel',380:'Italy',392:'Japan',400:'Jordan',398:'Kazakhstan',404:'Kenya',417:'Kyrgyzstan',418:'Laos',428:'Latvia',422:'Lebanon',426:'Lesotho',430:'Liberia',440:'Lithuania',450:'Madagascar',454:'Malawi',458:'Malaysia',466:'Mali',484:'Mexico',496:'Mongolia',499:'Montenegro',504:'Morocco',508:'Mozambique',104:'Myanmar',516:'Namibia',524:'Nepal',528:'Netherlands',554:'New Zealand',558:'Nicaragua',562:'Niger',566:'Nigeria',807:'North Macedonia',578:'Norway',512:'Oman',586:'Pakistan',591:'Panama',598:'Papua New Guinea',600:'Paraguay',604:'Peru',608:'Philippines',616:'Poland',620:'Portugal',642:'Romania',643:'Russia',646:'Rwanda',682:'Saudi Arabia',686:'Senegal',688:'Serbia',694:'Sierra Leone',706:'Somalia',710:'South Africa',728:'South Sudan',724:'Spain',144:'Sri Lanka',729:'Sudan',752:'Sweden',756:'Switzerland',760:'Syria',762:'Tajikistan',834:'Tanzania',764:'Thailand',768:'Togo',788:'Tunisia',792:'Turkey',795:'Turkmenistan',800:'Uganda',804:'Ukraine',784:'United Arab Emirates',826:'United Kingdom',840:'United States of America',858:'Uruguay',860:'Uzbekistan',862:'Venezuela',704:'Vietnam',887:'Yemen',894:'Zambia',716:'Zimbabwe'};

    const features = object.geometries.map(geom => {
      const id = parseInt(geom.id, 10);
      const name = ID_NAMES[id] || geom.properties?.name || ('ID ' + id);
      const type = geom.type === 'Polygon' ? 'Polygon' : 'MultiPolygon';
      const coordinates = geoCoords(geom.arcs, type);
      return {
        type: 'Feature',
        properties: { NAME: name },
        geometry: { type: type, coordinates: coordinates },
      };
    });

    return { type: 'FeatureCollection', features: features };
  }

  function renderCountries(geojson) {
    geoLayer = L.geoJSON(geojson, {
      style: feature => {
        const match = lookupCountry(feature.properties);
        if (!match) return { fillOpacity: 0, weight: 0, opacity: 0 };
        return {
          fillColor: getCountryColor(match.name),
          fillOpacity: 0.35,
          weight: 1,
          color: getCountryColor(match.name),
          opacity: 0.5,
        };
      },
      onEachFeature: (feature, layer) => {
        const match = lookupCountry(feature.properties);
        if (!match) return;

        layer.on('mouseover', e => {
          layer.setStyle({ fillOpacity: 0.55, weight: 2, opacity: 0.8 });
          layer.bringToFront();
          const html = buildPopupHTML(match.name, match.items);
          activePopup = L.popup({
            closeButton: false,
            className: 'trace-popup',
            offset: [0, -10],
            autoPan: false,
          })
          .setLatLng(e.latlng)
          .setContent(html)
          .openOn(map);
        });

        layer.on('mousemove', e => {
          if (activePopup) activePopup.setLatLng(e.latlng);
        });

        layer.on('mouseout', () => {
          const m = lookupCountry(feature.properties);
          if (!m) return;
          layer.setStyle({
            fillOpacity: 0.35,
            weight: 1,
            opacity: 0.5,
          });
          if (activePopup) { map.closePopup(activePopup); activePopup = null; }
        });
      },
      coordsToLatLng: coords => L.latLng(coords[0], coords[1]),
    }).addTo(map);
  }

  // ── Restyle countries on theme change ─────────────────────────────────────
  const origSetTheme = setTheme;
  setTheme = function(t) {
    origSetTheme(t);
    if (geoLayer) {
      geoLayer.eachLayer(layer => {
        if (!layer.feature) return;
        const match = lookupCountry(layer.feature.properties);
        if (!match) return;
        layer.setStyle({
          fillColor: getCountryColor(match.name),
          color: getCountryColor(match.name),
        });
      });
    }
  };

}());
</script>
